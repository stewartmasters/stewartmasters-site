<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bgrvp" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0d0d10"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgrvp)"/>

  <!-- Left: Roadmap — horizontal timeline blocks -->
  <text x="160" y="165" font-family="sans-serif" font-size="10" fill="#555" letter-spacing="3">ROADMAP</text>
  <line x1="160" y1="200" x2="490" y2="200" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Q1 block -->
  <rect x="160" y="215" width="90" height="70" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="175" y="238" font-family="sans-serif" font-size="9" fill="#444" letter-spacing="2">Q1</text>
  <rect x="170" y="248" width="60" height="5" rx="2" fill="#2a2a2a"/>
  <rect x="170" y="260" width="45" height="5" rx="2" fill="#222"/>
  <rect x="170" y="272" width="50" height="5" rx="2" fill="#1e1e1e"/>

  <!-- Q2 block -->
  <rect x="265" y="215" width="90" height="70" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="280" y="238" font-family="sans-serif" font-size="9" fill="#444" letter-spacing="2">Q2</text>
  <rect x="275" y="248" width="70" height="5" rx="2" fill="#2a2a2a"/>
  <rect x="275" y="260" width="50" height="5" rx="2" fill="#222"/>
  <rect x="275" y="272" width="60" height="5" rx="2" fill="#1e1e1e"/>

  <!-- Q3 block — faded -->
  <rect x="370" y="215" width="90" height="70" rx="4" fill="#0e0e0e" stroke="#1a1a1a" stroke-width="1"/>
  <text x="385" y="238" font-family="sans-serif" font-size="9" fill="#2a2a2a" letter-spacing="2">Q3</text>
  <rect x="380" y="248" width="65" height="5" rx="2" fill="#1a1a1a"/>
  <rect x="380" y="260" width="40" height="5" rx="2" fill="#181818"/>
  <rect x="380" y="272" width="55" height="5" rx="2" fill="#161616"/>

  <!-- Arrows between blocks -->
  <line x1="255" y1="250" x2="265" y2="250" stroke="#333" stroke-width="1"/>
  <line x1="360" y1="250" x2="370" y2="250" stroke="#333" stroke-width="1"/>

  <text x="160" y="320" font-family="sans-serif" font-size="9" fill="#2a2a2a" letter-spacing="1">Themes · Bets · Horizons</text>
  <text x="160" y="338" font-family="sans-serif" font-size="9" fill="#2a2a2a" letter-spacing="1">No owner · No date · No done</text>

  <!-- Dotted question mark areas beyond Q3 -->
  <text x="470" y="260" font-family="sans-serif" font-size="24" fill="#1a1a1a">···</text>

  <!-- Middle divider -->
  <line x1="600" y1="150" x2="600" y2="490" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="4 6"/>
  <text x="600" y="530" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2a2a2a" letter-spacing="3">VS</text>

  <!-- Right: Plan — execution grid with owners, dates -->
  <text x="660" y="165" font-family="sans-serif" font-size="10" fill="#00D4FF" fill-opacity="0.5" letter-spacing="3">PLAN</text>
  <line x1="660" y1="200" x2="1050" y2="200" stroke="#1e2e1e" stroke-width="1"/>

  <!-- Header row -->
  <rect x="660" y="215" width="390" height="28" rx="3" fill="#0e1210" stroke="#1e2e1e" stroke-width="1"/>
  <text x="670" y="233" font-family="sans-serif" font-size="9" fill="#445" letter-spacing="2">TASK</text>
  <text x="830" y="233" font-family="sans-serif" font-size="9" fill="#445" letter-spacing="2">OWNER</text>
  <text x="940" y="233" font-family="sans-serif" font-size="9" fill="#445" letter-spacing="2">DATE</text>
  <text x="1010" y="233" font-family="sans-serif" font-size="9" fill="#445" letter-spacing="2">DONE</text>

  <!-- Row 1 — complete -->
  <rect x="660" y="248" width="390" height="26" rx="2" fill="#0a100a"/>
  <rect x="670" y="256" width="130" height="5" rx="2" fill="#00D4FF" fill-opacity="0.2"/>
  <rect x="830" y="256" width="80" height="5" rx="2" fill="#334" fill-opacity="0.5"/>
  <rect x="940" y="256" width="55" height="5" rx="2" fill="#334" fill-opacity="0.4"/>
  <text x="1022" y="264" font-family="sans-serif" font-size="10" fill="#00D4FF" fill-opacity="0.6">✓</text>

  <!-- Row 2 — in progress -->
  <rect x="660" y="279" width="390" height="26" rx="2" fill="#0a100a"/>
  <rect x="670" y="287" width="110" height="5" rx="2" fill="#00D4FF" fill-opacity="0.25"/>
  <rect x="830" y="287" width="70" height="5" rx="2" fill="#334" fill-opacity="0.5"/>
  <rect x="940" y="287" width="55" height="5" rx="2" fill="#334" fill-opacity="0.4"/>
  <rect x="1010" y="282" width="30" height="14" rx="2" fill="#00D4FF" fill-opacity="0.1" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1"/>
  <text x="1015" y="293" font-family="sans-serif" font-size="7" fill="#00D4FF" fill-opacity="0.4">WIP</text>

  <!-- Row 3 — pending -->
  <rect x="660" y="310" width="390" height="26" rx="2" fill="#0a0e0a"/>
  <rect x="670" y="318" width="150" height="5" rx="2" fill="#334" fill-opacity="0.4"/>
  <rect x="830" y="318" width="80" height="5" rx="2" fill="#2a2a2a"/>
  <rect x="940" y="318" width="55" height="5" rx="2" fill="#2a2a2a"/>

  <!-- Row 4 — pending -->
  <rect x="660" y="341" width="390" height="26" rx="2" fill="#0a0e0a"/>
  <rect x="670" y="349" width="120" height="5" rx="2" fill="#334" fill-opacity="0.3"/>
  <rect x="830" y="349" width="60" height="5" rx="2" fill="#2a2a2a"/>
  <rect x="940" y="349" width="55" height="5" rx="2" fill="#2a2a2a"/>

  <text x="660" y="400" font-family="sans-serif" font-size="9" fill="#445" letter-spacing="1">Named owners · Specific dates · Clear done criteria</text>

  <text x="600" y="565" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#00D4FF" fill-opacity="0.2" letter-spacing="5">ROADMAP VS PLAN</text>
</svg>
