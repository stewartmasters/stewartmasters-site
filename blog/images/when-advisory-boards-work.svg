<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0d10"/>
      <stop offset="100%" style="stop-color:#0d1015"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Left: Broken advisory board -->
  <rect x="60" y="160" width="480" height="360" rx="6" fill="#1a0a0a" stroke="#2a1010" stroke-width="1.5"/>
  <text x="300" y="188" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#4a2020" letter-spacing="3" text-anchor="middle">ADVISORY BOARD THAT DOESN'T WORK</text>

  <rect x="90" y="210" width="420" height="44" rx="3" fill="#1f0e0e" stroke="#2a1515" stroke-width="1"/>
  <text x="300" y="228" font-family="monospace" font-size="10" fill="#4a2020" text-anchor="middle">Assembled for credibility, not capability</text>
  <text x="300" y="245" font-family="monospace" font-size="10" fill="#3a1515" text-anchor="middle">✗  Impressive names, wrong expertise</text>

  <rect x="90" y="270" width="420" height="44" rx="3" fill="#1f0e0e" stroke="#2a1515" stroke-width="1"/>
  <text x="300" y="288" font-family="monospace" font-size="10" fill="#4a2020" text-anchor="middle">No structure, no expectations</text>
  <text x="300" y="305" font-family="monospace" font-size="10" fill="#3a1515" text-anchor="middle">✗  Quarterly email update = not advisory</text>

  <rect x="90" y="330" width="420" height="44" rx="3" fill="#1f0e0e" stroke="#2a1515" stroke-width="1"/>
  <text x="300" y="348" font-family="monospace" font-size="10" fill="#4a2020" text-anchor="middle">No honest feedback loop</text>
  <text x="300" y="365" font-family="monospace" font-size="10" fill="#3a1515" text-anchor="middle">✗  Advisors tell you what you want to hear</text>

  <rect x="90" y="390" width="420" height="44" rx="3" fill="#1f0e0e" stroke="#2a1515" stroke-width="1"/>
  <text x="300" y="408" font-family="monospace" font-size="10" fill="#4a2020" text-anchor="middle">Overcommitted advisors</text>
  <text x="300" y="425" font-family="monospace" font-size="10" fill="#3a1515" text-anchor="middle">✗  10 boards = no real engagement anywhere</text>

  <rect x="90" y="450" width="420" height="36" rx="3" fill="#150808" stroke="#2a1010" stroke-width="1"/>
  <text x="300" y="473" font-family="monospace" font-size="10" fill="#2a0f0f" text-anchor="middle">Result: Logo on deck, zero value delivered</text>

  <!-- Right: Working advisory board -->
  <rect x="660" y="160" width="480" height="360" rx="6" fill="#0a1a10" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
  <text x="900" y="188" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#00D4FF" letter-spacing="3" text-anchor="middle" opacity="0.7">ADVISORY BOARD THAT WORKS</text>

  <rect x="690" y="210" width="420" height="44" rx="3" fill="#0d1f14" stroke="#1a3a20" stroke-width="1"/>
  <text x="900" y="228" font-family="monospace" font-size="10" fill="#2a7030" text-anchor="middle">Specific expertise in context</text>
  <text x="900" y="245" font-family="monospace" font-size="10" fill="#1a5020" text-anchor="middle">✓  Done the exact thing you're trying to do</text>

  <rect x="690" y="270" width="420" height="44" rx="3" fill="#0d1f14" stroke="#1a3a20" stroke-width="1"/>
  <text x="900" y="288" font-family="monospace" font-size="10" fill="#2a7030" text-anchor="middle">Clear mutual expectations</text>
  <text x="900" y="305" font-family="monospace" font-size="10" fill="#1a5020" text-anchor="middle">✓  Quarterly call + specific asks + equity</text>

  <rect x="690" y="330" width="420" height="44" rx="3" fill="#0d1f14" stroke="#1a3a20" stroke-width="1"/>
  <text x="900" y="348" font-family="monospace" font-size="10" fill="#2a7030" text-anchor="middle">Honest pushback welcomed</text>
  <text x="900" y="365" font-family="monospace" font-size="10" fill="#1a5020" text-anchor="middle">✓  Advisors who challenge decisions</text>

  <rect x="690" y="390" width="420" height="44" rx="3" fill="#0d1f14" stroke="#1a3a20" stroke-width="1"/>
  <text x="900" y="408" font-family="monospace" font-size="10" fill="#2a7030" text-anchor="middle">Genuine curiosity about the problem</text>
  <text x="900" y="425" font-family="monospace" font-size="10" fill="#1a5020" text-anchor="middle">✓  Engaged because they find it interesting</text>

  <rect x="690" y="450" width="420" height="36" rx="3" fill="#0a1a10" stroke="#1a3a20" stroke-width="1"/>
  <text x="900" y="473" font-family="monospace" font-size="10" fill="#1a5020" text-anchor="middle">Result: Real decisions improved, network opened</text>

  <!-- Divider -->
  <line x1="600" y1="160" x2="600" y2="520" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- Title -->
  <text x="600" y="80" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#00D4FF" opacity="0.6" letter-spacing="4" text-anchor="middle">BOARD &amp; ADVISORY</text>
  <text x="600" y="116" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="700" fill="#fff" opacity="0.9" text-anchor="middle">When Advisory Boards Work</text>

  <ellipse cx="900" cy="340" rx="200" ry="160" fill="#00D4FF" opacity="0.01"/>
</svg>
