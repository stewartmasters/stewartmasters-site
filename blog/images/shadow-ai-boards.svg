<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg2" cx="40%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#130a0a"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <radialGradient id="glow2" cx="40%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff4444" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <ellipse cx="480" cy="315" rx="380" ry="260" fill="url(#glow2)"/>

  <!-- Shadow grid in background -->
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="1020" y1="0" x2="1020" y2="630"/>
  </g>

  <!-- Board table silhouette -->
  <rect x="280" y="220" width="640" height="220" rx="8" fill="#100808" stroke="#1e0e0e" stroke-width="1"/>

  <!-- Seated figure silhouettes -->
  <g fill="#1a1010" stroke="#220e0e" stroke-width="1">
    <!-- Head shapes around table -->
    <circle cx="360" cy="205" r="22"/>
    <rect x="338" y="224" width="44" height="32" rx="6"/>
    <circle cx="480" cy="205" r="22"/>
    <rect x="458" y="224" width="44" height="32" rx="6"/>
    <circle cx="600" cy="205" r="22"/>
    <rect x="578" y="224" width="44" height="32" rx="6"/>
    <circle cx="720" cy="205" r="22"/>
    <rect x="698" y="224" width="44" height="32" rx="6"/>
    <circle cx="840" cy="205" r="22"/>
    <rect x="818" y="224" width="44" height="32" rx="6"/>
    <!-- Bottom row -->
    <circle cx="360" cy="455" r="22"/>
    <rect x="338" y="434" width="44" height="32" rx="6"/>
    <circle cx="600" cy="455" r="22"/>
    <rect x="578" y="434" width="44" height="32" rx="6"/>
    <circle cx="840" cy="455" r="22"/>
    <rect x="818" y="434" width="44" height="32" rx="6"/>
  </g>

  <!-- One glowing "AI" figure -->
  <circle cx="480" cy="455" r="22" fill="#1a0808" stroke="#ff4444" stroke-opacity="0.4" stroke-width="1"/>
  <rect x="458" y="434" width="44" height="32" rx="6" fill="#1a0808" stroke="#ff4444" stroke-opacity="0.3" stroke-width="1"/>
  <text x="480" y="460" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#ff6666" fill-opacity="0.8">AI</text>

  <!-- Warning icon above AI figure -->
  <text x="480" y="420" text-anchor="middle" font-size="18" fill="#ff4444" fill-opacity="0.5">⚠</text>

  <!-- Laptop screens on table with data -->
  <g>
    <rect x="330" y="255" width="50" height="35" rx="2" fill="#0f0000" stroke="#ff3333" stroke-opacity="0.25" stroke-width="1"/>
    <text x="355" y="278" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff4444" fill-opacity="0.4">///</text>

    <rect x="575" y="255" width="50" height="35" rx="2" fill="#0a0a14" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1"/>
    <text x="600" y="278" text-anchor="middle" font-family="monospace" font-size="9" fill="#00D4FF" fill-opacity="0.35">0 1</text>

    <rect x="810" y="255" width="50" height="35" rx="2" fill="#0a100a" stroke="#44aa44" stroke-opacity="0.2" stroke-width="1"/>
  </g>

  <!-- Label -->
  <text x="600" y="575" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="13" fill="#ff4444" fill-opacity="0.3" letter-spacing="5">SHADOW AI</text>
</svg>
