<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg-bdt" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0e0e18"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <radialGradient id="glow-bdt" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-bdt)"/>
  <ellipse cx="600" cy="315" rx="360" ry="240" fill="url(#glow-bdt)"/>

  <!-- Org chart — hiring sequence -->
  <!-- Level 1: PM (first hire) -->
  <rect x="540" y="165" width="120" height="50" rx="5" fill="#00D4FF" fill-opacity="0.12" stroke="#00D4FF" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="600" y="188" text-anchor="middle" font-family="monospace" font-size="9" fill="#00D4FF" fill-opacity="0.8">PRODUCT</text>
  <text x="600" y="202" text-anchor="middle" font-family="monospace" font-size="9" fill="#00D4FF" fill-opacity="0.8">MANAGER</text>
  <text x="600" y="214" text-anchor="middle" font-family="monospace" font-size="8" fill="#00D4FF" fill-opacity="0.4">HIRE 1</text>

  <!-- Level 2: Data + Engineers -->
  <line x1="600" y1="215" x2="490" y2="275" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="600" y1="215" x2="710" y2="275" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1"/>

  <rect x="420" y="275" width="110" height="50" rx="5" fill="#00D4FF" fill-opacity="0.07" stroke="#00D4FF" stroke-opacity="0.3" stroke-width="1"/>
  <text x="475" y="298" text-anchor="middle" font-family="monospace" font-size="9" fill="#00D4FF" fill-opacity="0.6">DATA</text>
  <text x="475" y="312" text-anchor="middle" font-family="monospace" font-size="9" fill="#00D4FF" fill-opacity="0.6">ANALYST</text>
  <text x="475" y="324" text-anchor="middle" font-family="monospace" font-size="8" fill="#00D4FF" fill-opacity="0.35">HIRE 2</text>

  <rect x="670" y="275" width="110" height="50" rx="5" fill="#00D4FF" fill-opacity="0.07" stroke="#00D4FF" stroke-opacity="0.3" stroke-width="1"/>
  <text x="725" y="298" text-anchor="middle" font-family="monospace" font-size="9" fill="#00D4FF" fill-opacity="0.6">ENGINEER</text>
  <text x="725" y="312" text-anchor="middle" font-family="monospace" font-size="8" fill="#00D4FF" fill-opacity="0.35">HIRE 3</text>

  <!-- Level 3: Digital Leader -->
  <line x1="475" y1="325" x2="545" y2="390" stroke="#00D4FF" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="725" y1="325" x2="655" y2="390" stroke="#00D4FF" stroke-opacity="0.15" stroke-width="1"/>

  <rect x="520" y="390" width="160" height="50" rx="5" fill="#00D4FF" fill-opacity="0.05" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1"/>
  <text x="600" y="413" text-anchor="middle" font-family="monospace" font-size="9" fill="#00D4FF" fill-opacity="0.45">DIGITAL LEADER</text>
  <text x="600" y="427" text-anchor="middle" font-family="monospace" font-size="8" fill="#00D4FF" fill-opacity="0.3">HIRE 4 — WHEN READY</text>

  <!-- Step numbers -->
  <text x="310" y="200" font-family="monospace" font-size="10" fill="#00D4FF" fill-opacity="0.2">01</text>
  <text x="310" y="310" font-family="monospace" font-size="10" fill="#00D4FF" fill-opacity="0.15">02</text>
  <text x="310" y="420" font-family="monospace" font-size="10" fill="#00D4FF" fill-opacity="0.12">03</text>

  <text x="600" y="570" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="12" fill="#00D4FF" fill-opacity="0.25" letter-spacing="5">DIGITAL TEAM</text>
</svg>
