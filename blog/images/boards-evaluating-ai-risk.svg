<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#090d16"/>
      <stop offset="100%" style="stop-color:#0c1020"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Risk category stack — left side -->
  <!-- Operational -->
  <rect x="60" y="150" width="500" height="80" rx="5" fill="#0e1a10" stroke="#1e3020" stroke-width="1.5"/>
  <rect x="60" y="150" width="6" height="80" rx="2" fill="#2a8040" opacity="0.8"/>
  <text x="84" y="181" font-family="'Space Grotesk', sans-serif" font-size="12" fill="#2a9040" letter-spacing="1" font-weight="600">OPERATIONAL</text>
  <text x="84" y="200" font-family="monospace" font-size="10" fill="#444">Models fail · performance degrades · edge cases emerge</text>
  <text x="84" y="217" font-family="monospace" font-size="10" fill="#333">Is there a fallback when AI is wrong?</text>

  <!-- Regulatory -->
  <rect x="60" y="248" width="500" height="80" rx="5" fill="#0e1020" stroke="#1e2040" stroke-width="1.5"/>
  <rect x="60" y="248" width="6" height="80" rx="2" fill="#4060c0" opacity="0.7"/>
  <text x="84" y="279" font-family="'Space Grotesk', sans-serif" font-size="12" fill="#4060c0" letter-spacing="1" font-weight="600">REGULATORY</text>
  <text x="84" y="298" font-family="monospace" font-size="10" fill="#444">EU AI Act · sector rules · accountability questions</text>
  <text x="84" y="315" font-family="monospace" font-size="10" fill="#333">Has legal reviewed high-risk applications?</text>

  <!-- Reputational -->
  <rect x="60" y="346" width="500" height="80" rx="5" fill="#1a1008" stroke="#2a2010" stroke-width="1.5"/>
  <rect x="60" y="346" width="6" height="80" rx="2" fill="#c08030" opacity="0.7"/>
  <text x="84" y="377" font-family="'Space Grotesk', sans-serif" font-size="12" fill="#c08030" letter-spacing="1" font-weight="600">REPUTATIONAL</text>
  <text x="84" y="396" font-family="monospace" font-size="10" fill="#444">Bias in decisions · undisclosed AI · misused data</text>
  <text x="84" y="413" font-family="monospace" font-size="10" fill="#333">Are there documented AI use principles?</text>

  <!-- Strategic -->
  <rect x="60" y="444" width="500" height="80" rx="5" fill="#0a1818" stroke="#1a2828" stroke-width="1.5"/>
  <rect x="60" y="444" width="6" height="80" rx="2" fill="#30a0a0" opacity="0.6"/>
  <text x="84" y="475" font-family="'Space Grotesk', sans-serif" font-size="12" fill="#30a0a0" letter-spacing="1" font-weight="600">STRATEGIC</text>
  <text x="84" y="494" font-family="monospace" font-size="10" fill="#444">Competitive dependency · vendor risk · capability gaps</text>
  <text x="84" y="511" font-family="monospace" font-size="10" fill="#333">Is management aware of the risk exposure?</text>

  <!-- Right panel: Board questions -->
  <rect x="660" y="140" width="460" height="370" rx="6" fill="#080c10" stroke="#12182a" stroke-width="1"/>
  <text x="880" y="175" font-family="monospace" font-size="11" fill="#1e3060" text-anchor="middle" letter-spacing="2">4 QUESTIONS FOR EVERY BOARD</text>
  <line x1="680" y1="188" x2="1100" y2="188" stroke="#12182a" stroke-width="1"/>

  <text x="690" y="218" font-family="monospace" font-size="10" fill="#00D4FF" opacity="0.5">01</text>
  <text x="720" y="218" font-family="monospace" font-size="10" fill="#444">Is management aware of the risks?</text>

  <text x="690" y="256" font-family="monospace" font-size="10" fill="#00D4FF" opacity="0.45">02</text>
  <text x="720" y="256" font-family="monospace" font-size="10" fill="#3a3a3a">Is there a framework for what AI to deploy?</text>

  <text x="690" y="294" font-family="monospace" font-size="10" fill="#00D4FF" opacity="0.4">03</text>
  <text x="720" y="294" font-family="monospace" font-size="10" fill="#333">Is someone accountable for AI governance?</text>

  <text x="690" y="332" font-family="monospace" font-size="10" fill="#00D4FF" opacity="0.35">04</text>
  <text x="720" y="332" font-family="monospace" font-size="10" fill="#2a2a2a">Are we prepared for a public failure?</text>

  <line x1="680" y1="354" x2="1100" y2="354" stroke="#12182a" stroke-width="0.5" stroke-dasharray="3,6"/>

  <text x="690" y="380" font-family="monospace" font-size="10" fill="#1a3050" opacity="0.9">Don't block adoption — ask if risks are known</text>
  <text x="690" y="400" font-family="monospace" font-size="10" fill="#152040" opacity="0.8">and managed. That's the mandate.</text>

  <rect x="680" y="420" width="420" height="76" rx="3" fill="#080d14" stroke="#12182a" stroke-width="1"/>
  <text x="890" y="446" font-family="monospace" font-size="10" fill="#00D4FF" opacity="0.6" text-anchor="middle">AI governance ≠ AI knowledge.</text>
  <text x="890" y="464" font-family="monospace" font-size="10" fill="#1a3050" opacity="0.8" text-anchor="middle">Boards need the right questions,</text>
  <text x="890" y="482" font-family="monospace" font-size="10" fill="#152040" opacity="0.7" text-anchor="middle">not technical expertise.</text>

  <!-- Title -->
  <text x="600" y="78" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#00D4FF" opacity="0.6" letter-spacing="4" text-anchor="middle">BOARD &amp; ADVISORY</text>
  <text x="600" y="114" font-family="'Space Grotesk', sans-serif" font-size="26" font-weight="700" fill="#fff" opacity="0.9" text-anchor="middle">How Boards Should Evaluate AI Risk</text>

  <ellipse cx="310" cy="340" rx="220" ry="180" fill="#4060c0" opacity="0.015"/>
</svg>
