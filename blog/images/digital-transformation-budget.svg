<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f0a"/>
      <stop offset="100%" style="stop-color:#0d1510"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Three budget buckets -->
  <!-- RUN bucket -->
  <rect x="100" y="180" width="260" height="300" rx="6" fill="none" stroke="#1a2a1f" stroke-width="1.5"/>
  <rect x="100" y="180" width="260" height="300" rx="6" fill="#0a1210" opacity="0.8"/>
  <text x="230" y="210" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#2a5030" letter-spacing="3" text-anchor="middle">RUN</text>
  <text x="230" y="232" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="700" fill="#3a8040" text-anchor="middle">25%</text>

  <!-- RUN bar fill -->
  <rect x="130" y="260" width="200" height="16" rx="3" fill="#1a3020" opacity="0.5"/>
  <rect x="130" y="260" width="50" height="16" rx="3" fill="#2a6030"/>
  <text x="230" y="296" font-family="monospace" font-size="10" fill="#2a5030" text-anchor="middle">Maintenance &amp; ops</text>
  <text x="230" y="312" font-family="monospace" font-size="10" fill="#2a5030" text-anchor="middle">Licences &amp; support</text>
  <text x="230" y="328" font-family="monospace" font-size="10" fill="#2a5030" text-anchor="middle">Infrastructure</text>
  <rect x="130" y="360" width="200" height="28" rx="3" fill="#0f1f14" stroke="#1a3020" stroke-width="1"/>
  <text x="230" y="379" font-family="monospace" font-size="10" fill="#2a4030" text-anchor="middle">Non-discretionary</text>
  <text x="230" y="395" font-family="monospace" font-size="10" fill="#2a4030" text-anchor="middle">Short payback</text>
  <text x="230" y="440" font-family="monospace" font-size="11" fill="#1e3a24" text-anchor="middle">Often underestimated</text>

  <!-- CHANGE bucket -->
  <rect x="470" y="180" width="260" height="300" rx="6" fill="none" stroke="#2a2a1a" stroke-width="1.5"/>
  <rect x="470" y="180" width="260" height="300" rx="6" fill="#121210" opacity="0.8"/>
  <text x="600" y="210" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#5a5020" letter-spacing="3" text-anchor="middle">CHANGE</text>
  <text x="600" y="232" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="700" fill="#a0a030" text-anchor="middle">40%</text>

  <!-- CHANGE bar fill -->
  <rect x="500" y="260" width="200" height="16" rx="3" fill="#2a2810" opacity="0.5"/>
  <rect x="500" y="260" width="80" height="16" rx="3" fill="#7a7020"/>
  <text x="600" y="296" font-family="monospace" font-size="10" fill="#5a5020" text-anchor="middle">Better tooling</text>
  <text x="600" y="312" font-family="monospace" font-size="10" fill="#5a5020" text-anchor="middle">Process automation</text>
  <text x="600" y="328" font-family="monospace" font-size="10" fill="#5a5020" text-anchor="middle">Upskilling</text>
  <rect x="500" y="360" width="200" height="28" rx="3" fill="#1a1a0f" stroke="#2a2a1a" stroke-width="1"/>
  <text x="600" y="379" font-family="monospace" font-size="10" fill="#4a4a20" text-anchor="middle">Measurable return</text>
  <text x="600" y="395" font-family="monospace" font-size="10" fill="#4a4a20" text-anchor="middle">6-18 month payback</text>
  <text x="600" y="440" font-family="monospace" font-size="11" fill="#3a3a14" text-anchor="middle">Comfort zone spending</text>

  <!-- TRANSFORM bucket -->
  <rect x="840" y="180" width="260" height="300" rx="6" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.4"/>
  <rect x="840" y="180" width="260" height="300" rx="6" fill="#0a1218" opacity="0.8"/>
  <text x="970" y="210" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#00D4FF" letter-spacing="3" text-anchor="middle" opacity="0.6">TRANSFORM</text>
  <text x="970" y="232" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="700" fill="#00D4FF" text-anchor="middle" opacity="0.8">35%</text>

  <!-- TRANSFORM bar fill -->
  <rect x="870" y="260" width="200" height="16" rx="3" fill="#0a2030" opacity="0.5"/>
  <rect x="870" y="260" width="70" height="16" rx="3" fill="#00D4FF" opacity="0.4"/>
  <text x="970" y="296" font-family="monospace" font-size="10" fill="#00D4FF" text-anchor="middle" opacity="0.6">New capabilities</text>
  <text x="970" y="312" font-family="monospace" font-size="10" fill="#00D4FF" text-anchor="middle" opacity="0.6">Business model change</text>
  <text x="970" y="328" font-family="monospace" font-size="10" fill="#00D4FF" text-anchor="middle" opacity="0.6">Data &amp; AI foundation</text>
  <rect x="870" y="360" width="200" height="28" rx="3" fill="#0a1820" stroke="#1a2a30" stroke-width="1"/>
  <text x="970" y="379" font-family="monospace" font-size="10" fill="#1a4a60" text-anchor="middle">Strategic, uncertain</text>
  <text x="970" y="395" font-family="monospace" font-size="10" fill="#1a4a60" text-anchor="middle">3-5 year payback</text>
  <text x="970" y="440" font-family="monospace" font-size="11" fill="#1a3a50" text-anchor="middle">Often cut first — wrongly</text>

  <!-- Warning callout at bottom -->
  <rect x="100" y="510" width="1000" height="44" rx="4" fill="#0a0f0a" stroke="#1a2a1f" stroke-width="1"/>
  <text x="600" y="528" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#2a6030" opacity="0.8" text-anchor="middle" letter-spacing="2">KEY PRINCIPLE</text>
  <text x="600" y="547" font-family="'Space Grotesk', sans-serif" font-size="13" fill="#aaa" text-anchor="middle">Technology should be max 40–50% of total budget — people and change drive success</text>

  <!-- Title -->
  <text x="600" y="80" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#00D4FF" opacity="0.6" letter-spacing="4" text-anchor="middle">DIGITAL STRATEGY</text>
  <text x="600" y="116" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="700" fill="#fff" opacity="0.9" text-anchor="middle">Structuring a Digital Transformation Budget</text>

  <!-- Ambient glow -->
  <ellipse cx="970" cy="315" rx="130" ry="100" fill="#00D4FF" opacity="0.02"/>
</svg>
