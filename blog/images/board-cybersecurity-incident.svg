<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0d12"/>
      <stop offset="100%" style="stop-color:#0d1018"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Three phase columns -->
  <!-- BEFORE column -->
  <rect x="60" y="155" width="320" height="360" rx="6" fill="#0a1218" stroke="#1a2530" stroke-width="1"/>
  <text x="220" y="183" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#1a3a50" letter-spacing="3" text-anchor="middle">BEFORE</text>

  <rect x="80" y="200" width="280" height="44" rx="3" fill="#0d1a20" stroke="#1a2a35" stroke-width="1"/>
  <text x="220" y="218" font-family="monospace" font-size="10" fill="#2a7090" text-anchor="middle">Know your CISO directly</text>
  <text x="220" y="234" font-family="monospace" font-size="9" fill="#1a4a60" text-anchor="middle">Board → CISO relationship</text>

  <rect x="80" y="258" width="280" height="44" rx="3" fill="#0d1a20" stroke="#1a2a35" stroke-width="1"/>
  <text x="220" y="276" font-family="monospace" font-size="10" fill="#2a7090" text-anchor="middle">Review the IR plan</text>
  <text x="220" y="292" font-family="monospace" font-size="9" fill="#1a4a60" text-anchor="middle">Board must approve &amp; read it</text>

  <rect x="80" y="316" width="280" height="44" rx="3" fill="#0d1a20" stroke="#1a2a35" stroke-width="1"/>
  <text x="220" y="334" font-family="monospace" font-size="10" fill="#2a7090" text-anchor="middle">Run tabletop exercises</text>
  <text x="220" y="350" font-family="monospace" font-size="9" fill="#1a4a60" text-anchor="middle">Include board members</text>

  <rect x="80" y="374" width="280" height="44" rx="3" fill="#0d1a20" stroke="#1a2a35" stroke-width="1"/>
  <text x="220" y="392" font-family="monospace" font-size="10" fill="#2a7090" text-anchor="middle">Pre-agree ransom position</text>
  <text x="220" y="408" font-family="monospace" font-size="9" fill="#1a4a60" text-anchor="middle">Decide before you need to</text>

  <rect x="80" y="432" width="280" height="36" rx="3" fill="#081218" stroke="#1a2030" stroke-width="1"/>
  <text x="220" y="455" font-family="monospace" font-size="9" fill="#1a3a50" text-anchor="middle">Preparation phase</text>

  <!-- DURING column -->
  <rect x="440" y="155" width="320" height="360" rx="6" fill="#1a0a08" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
  <text x="600" y="183" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#00D4FF" letter-spacing="3" text-anchor="middle" opacity="0.8">DURING</text>

  <rect x="460" y="200" width="280" height="44" rx="3" fill="#200e0a" stroke="#3a1a14" stroke-width="1"/>
  <text x="600" y="218" font-family="monospace" font-size="10" fill="#c04030" text-anchor="middle">Enable, don't manage</text>
  <text x="600" y="234" font-family="monospace" font-size="9" fill="#803020" text-anchor="middle">Let the response team respond</text>

  <rect x="460" y="258" width="280" height="44" rx="3" fill="#200e0a" stroke="#3a1a14" stroke-width="1"/>
  <text x="600" y="276" font-family="monospace" font-size="10" fill="#c04030" text-anchor="middle">Communication rhythm</text>
  <text x="600" y="292" font-family="monospace" font-size="9" fill="#803020" text-anchor="middle">Informed without overwhelming</text>

  <rect x="460" y="316" width="280" height="44" rx="3" fill="#200e0a" stroke="#3a1a14" stroke-width="1"/>
  <text x="600" y="334" font-family="monospace" font-size="10" fill="#c04030" text-anchor="middle">Reserve authority</text>
  <text x="600" y="350" font-family="monospace" font-size="9" fill="#803020" text-anchor="middle">Ransom / spend / notification</text>

  <rect x="460" y="374" width="280" height="44" rx="3" fill="#200e0a" stroke="#3a1a14" stroke-width="1"/>
  <text x="600" y="392" font-family="monospace" font-size="10" fill="#c04030" text-anchor="middle">Legal &amp; regulatory counsel</text>
  <text x="600" y="408" font-family="monospace" font-size="9" fill="#803020" text-anchor="middle">Jurisdiction varies — act fast</text>

  <rect x="460" y="432" width="280" height="36" rx="3" fill="#180808" stroke="#2a1010" stroke-width="1"/>
  <text x="600" y="455" font-family="monospace" font-size="9" fill="#5a2020" text-anchor="middle">Crisis response phase</text>

  <!-- AFTER column -->
  <rect x="820" y="155" width="320" height="360" rx="6" fill="#0a180a" stroke="#1a3018" stroke-width="1"/>
  <text x="980" y="183" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#1a5020" letter-spacing="3" text-anchor="middle">AFTER</text>

  <rect x="840" y="200" width="280" height="44" rx="3" fill="#0d1f0d" stroke="#1a3018" stroke-width="1"/>
  <text x="980" y="218" font-family="monospace" font-size="10" fill="#2a7030" text-anchor="middle">Board-level post-mortem</text>
  <text x="980" y="234" font-family="monospace" font-size="9" fill="#1a4a20" text-anchor="middle">Governance gaps first</text>

  <rect x="840" y="258" width="280" height="44" rx="3" fill="#0d1f0d" stroke="#1a3018" stroke-width="1"/>
  <text x="980" y="276" font-family="monospace" font-size="10" fill="#2a7030" text-anchor="middle">Was the IR plan effective?</text>
  <text x="980" y="292" font-family="monospace" font-size="9" fill="#1a4a20" text-anchor="middle">Update based on what broke</text>

  <rect x="840" y="316" width="280" height="44" rx="3" fill="#0d1f0d" stroke="#1a3018" stroke-width="1"/>
  <text x="980" y="334" font-family="monospace" font-size="10" fill="#2a7030" text-anchor="middle">Regulatory remediation</text>
  <text x="980" y="350" font-family="monospace" font-size="9" fill="#1a4a20" text-anchor="middle">Board owns the oversight</text>

  <rect x="840" y="374" width="280" height="44" rx="3" fill="#0d1f0d" stroke="#1a3018" stroke-width="1"/>
  <text x="980" y="392" font-family="monospace" font-size="10" fill="#2a7030" text-anchor="middle">Investment review</text>
  <text x="980" y="408" font-family="monospace" font-size="9" fill="#1a4a20" text-anchor="middle">What must now change</text>

  <rect x="840" y="432" width="280" height="36" rx="3" fill="#081208" stroke="#1a2010" stroke-width="1"/>
  <text x="980" y="455" font-family="monospace" font-size="9" fill="#1a4018" text-anchor="middle">Recovery &amp; learning phase</text>

  <!-- Arrows between columns -->
  <line x1="382" y1="335" x2="438" y2="335" stroke="#00D4FF" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <polygon points="435,330 443,335 435,340" fill="#00D4FF" opacity="0.4"/>
  <line x1="762" y1="335" x2="818" y2="335" stroke="#1a5020" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="815,330 823,335 815,340" fill="#2a7030" opacity="0.5"/>

  <!-- Title -->
  <text x="600" y="72" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#00D4FF" opacity="0.6" letter-spacing="4" text-anchor="middle">BOARD &amp; ADVISORY</text>
  <text x="600" y="108" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="700" fill="#fff" opacity="0.9" text-anchor="middle">The Board's Role in a Cybersecurity Incident</text>

  <!-- Alert glow -->
  <ellipse cx="600" cy="335" rx="180" ry="120" fill="#c04030" opacity="0.015"/>
</svg>
