<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0d12"/>
      <stop offset="100%" style="stop-color:#0d1018"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="65" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#00D4FF" opacity="0.6" letter-spacing="4" text-anchor="middle">AI &amp; TECHNOLOGY</text>
  <text x="600" y="100" font-family="'Space Grotesk', sans-serif" font-size="26" font-weight="700" fill="#fff" opacity="0.9" text-anchor="middle">AI vs Automation — What Businesses Get Wrong</text>

  <!-- Column headers -->
  <text x="300" y="145" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#4a90c0" text-anchor="middle" letter-spacing="2" opacity="0.8">AUTOMATION</text>
  <text x="900" y="145" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#00D4FF" text-anchor="middle" letter-spacing="2" opacity="0.8">AI</text>
  <line x1="80" y1="153" x2="550" y2="153" stroke="#4a90c0" stroke-width="0.5" opacity="0.3"/>
  <line x1="650" y1="153" x2="1120" y2="153" stroke="#00D4FF" stroke-width="0.5" opacity="0.3"/>
  <line x1="600" y1="153" x2="600" y2="520" stroke="#1a1a1a" stroke-width="1"/>
  <text x="600" y="330" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="700" fill="#1a2a3a" text-anchor="middle">VS</text>

  <!-- Automation panel -->
  <rect x="80" y="162" width="490" height="340" rx="8" fill="#0a1020" stroke="#1a3040" stroke-width="1"/>

  <text x="325" y="196" font-family="monospace" font-size="9" fill="#3a6080" text-anchor="middle">Executes defined rules without human intervention</text>
  <text x="325" y="216" font-family="monospace" font-size="9" fill="#2a5070" text-anchor="middle">Deterministic — same inputs always produce same outputs</text>
  <line x1="100" y1="232" x2="550" y2="232" stroke="#1a2a40" stroke-width="0.5" stroke-dasharray="3,3"/>

  <text x="120" y="258" font-family="monospace" font-size="9" fill="#2a6080">Use when:</text>
  <text x="325" y="278" font-family="monospace" font-size="9" fill="#2a5070" text-anchor="middle">High-volume · rule-based · consistent inputs</text>
  <text x="325" y="296" font-family="monospace" font-size="9" fill="#1a4060" text-anchor="middle">Clear logic that can be fully specified in advance</text>
  <text x="325" y="314" font-family="monospace" font-size="8" fill="#1a3a50" text-anchor="middle">Example: if invoice matches PO → approve payment</text>

  <line x1="100" y1="330" x2="550" y2="330" stroke="#1a2a40" stroke-width="0.5" stroke-dasharray="3,3"/>

  <text x="120" y="354" font-family="monospace" font-size="9" fill="#2a6080">Strengths:</text>
  <text x="325" y="374" font-family="monospace" font-size="8" fill="#1a4060" text-anchor="middle">Fast · cheap to run · easy to audit · fully predictable</text>
  <text x="325" y="392" font-family="monospace" font-size="8" fill="#1a3050" text-anchor="middle">Doesn't require training data · no probabilistic risk</text>

  <text x="120" y="418" font-family="monospace" font-size="9" fill="#903030">Fails when:</text>
  <text x="325" y="438" font-family="monospace" font-size="8" fill="#5a2020" text-anchor="middle">Inputs fall outside defined cases · too much variability</text>
  <text x="325" y="456" font-family="monospace" font-size="8" fill="#3a1515" text-anchor="middle">Produces brittle systems that break and require constant fixes</text>
  <rect x="155" y="480" width="340" height="5" rx="2" fill="#1a5080" opacity="0.3"/>

  <!-- AI panel -->
  <rect x="630" y="162" width="490" height="340" rx="8" fill="#0a1820" stroke="#00D4FF" stroke-width="1" opacity="0.4"/>

  <text x="875" y="196" font-family="monospace" font-size="9" fill="#2a7090" text-anchor="middle">Learns patterns from data to make predictions and decisions</text>
  <text x="875" y="216" font-family="monospace" font-size="9" fill="#1a5070" text-anchor="middle">Probabilistic — handles variability but introduces uncertainty</text>
  <line x1="650" y1="232" x2="1100" y2="232" stroke="#1a3040" stroke-width="0.5" stroke-dasharray="3,3"/>

  <text x="670" y="258" font-family="monospace" font-size="9" fill="#2a7090">Use when:</text>
  <text x="875" y="278" font-family="monospace" font-size="9" fill="#2a6080" text-anchor="middle">High variability · judgment required · pattern recognition</text>
  <text x="875" y="296" font-family="monospace" font-size="9" fill="#1a5070" text-anchor="middle">Problem is better described by examples than explicit rules</text>
  <text x="875" y="314" font-family="monospace" font-size="8" fill="#1a3a50" text-anchor="middle">Example: given behaviour history → predict churn likelihood</text>

  <line x1="650" y1="330" x2="1100" y2="330" stroke="#1a3040" stroke-width="0.5" stroke-dasharray="3,3"/>

  <text x="670" y="354" font-family="monospace" font-size="9" fill="#2a7090">Strengths:</text>
  <text x="875" y="374" font-family="monospace" font-size="8" fill="#1a5070" text-anchor="middle">Handles variability · improves with more data · generalises</text>
  <text x="875" y="392" font-family="monospace" font-size="8" fill="#1a4060" text-anchor="middle">Better decisions in complex, high-context scenarios</text>

  <text x="670" y="418" font-family="monospace" font-size="9" fill="#903030">Fails when:</text>
  <text x="875" y="438" font-family="monospace" font-size="8" fill="#5a2020" text-anchor="middle">Applied to problems better solved by simple rules</text>
  <text x="875" y="456" font-family="monospace" font-size="8" fill="#3a1515" text-anchor="middle">Data not ready · probabilistic output not appropriate</text>
  <rect x="705" y="480" width="340" height="5" rx="2" fill="#00D4FF" opacity="0.15"/>

  <!-- Bottom bar -->
  <rect x="80" y="522" width="1040" height="36" rx="4" fill="#0a0f0a" stroke="#1a2a1a" stroke-width="1"/>
  <text x="600" y="545" font-family="'Space Grotesk', sans-serif" font-size="13" fill="#aaa" text-anchor="middle">Automation handles rules reliably. AI handles judgment. The best operations use both correctly.</text>
</svg>
