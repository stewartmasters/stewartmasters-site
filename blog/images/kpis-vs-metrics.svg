<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bgkm" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#0a0a0d"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgkm)"/>

  <!-- LEFT SIDE: Cluttered metrics panel -->
  <text x="295" y="110" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#444" letter-spacing="3">METRICS (EVERYTHING)</text>

  <!-- Small gauge 1 -->
  <circle cx="200" cy="200" r="45" fill="none" stroke="#1a1a1a" stroke-width="8"/>
  <path d="M 162,230 A 45,45 0 0,1 238,230" fill="none" stroke="#222" stroke-width="8" stroke-linecap="round"/>
  <path d="M 162,230 A 45,45 0 0,1 214,164" fill="none" stroke="#333" stroke-width="8" stroke-linecap="round"/>
  <text x="200" y="207" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">42%</text>
  <text x="200" y="255" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#2a2a2a" letter-spacing="1">PAGEVIEWS</text>

  <!-- Small gauge 2 -->
  <circle cx="295" cy="200" r="45" fill="none" stroke="#1a1a1a" stroke-width="8"/>
  <path d="M 257,230 A 45,45 0 0,1 333,230" fill="none" stroke="#222" stroke-width="8" stroke-linecap="round"/>
  <path d="M 257,230 A 45,45 0 0,1 271,162" fill="none" stroke="#2a2a2a" stroke-width="8" stroke-linecap="round"/>
  <text x="295" y="207" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2a2a2a">7.3k</text>
  <text x="295" y="255" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#2a2a2a" letter-spacing="1">BOUNCE</text>

  <!-- Small gauge 3 -->
  <circle cx="390" cy="200" r="45" fill="none" stroke="#1a1a1a" stroke-width="8"/>
  <path d="M 352,230 A 45,45 0 0,1 428,230" fill="none" stroke="#222" stroke-width="8" stroke-linecap="round"/>
  <path d="M 352,230 A 45,45 0 0,1 400,157" fill="none" stroke="#252525" stroke-width="8" stroke-linecap="round"/>
  <text x="390" y="207" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2a2a2a">88%</text>
  <text x="390" y="255" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#2a2a2a" letter-spacing="1">SESSIONS</text>

  <!-- More small gauges -->
  <circle cx="200" cy="340" r="38" fill="none" stroke="#181818" stroke-width="6"/>
  <text x="200" y="347" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#252525">1.2s</text>
  <text x="200" y="390" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#222" letter-spacing="1">LOAD TIME</text>

  <circle cx="295" cy="340" r="38" fill="none" stroke="#181818" stroke-width="6"/>
  <text x="295" y="347" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#222">34</text>
  <text x="295" y="390" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#222" letter-spacing="1">TICKETS</text>

  <circle cx="390" cy="340" r="38" fill="none" stroke="#181818" stroke-width="6"/>
  <text x="390" y="347" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#222">0.3%</text>
  <text x="390" y="390" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#222" letter-spacing="1">CTR</text>

  <!-- Divider -->
  <line x1="540" y1="100" x2="540" y2="530" stroke="#1e1e1e" stroke-width="1" stroke-dasharray="4,6"/>

  <!-- "vs" -->
  <text x="600" y="335" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#333" letter-spacing="2">vs</text>

  <!-- RIGHT SIDE: Single clear KPI -->
  <text x="830" y="110" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#00D4FF" fill-opacity="0.5" letter-spacing="3">KPI (WHAT MATTERS)</text>

  <!-- Large single KPI gauge -->
  <circle cx="830" cy="300" r="130" fill="none" stroke="#0e1818" stroke-width="18"/>
  <path d="M 700,340 A 130,130 0 0,1 960,340" fill="none" stroke="#0e1818" stroke-width="18" stroke-linecap="round"/>
  <!-- Filled arc portion - 78% -->
  <path d="M 700,340 A 130,130 0 0,1 830,171" fill="none" stroke="#00D4FF" stroke-opacity="0.6" stroke-width="18" stroke-linecap="round"/>
  <path d="M 830,171 A 130,130 0 0,1 914,238" fill="none" stroke="#00D4FF" stroke-opacity="0.3" stroke-width="18" stroke-linecap="round"/>

  <!-- KPI value -->
  <text x="830" y="295" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="42" fill="#ffffff" fill-opacity="0.8" font-weight="700">78%</text>
  <text x="830" y="325" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#00D4FF" fill-opacity="0.5" letter-spacing="2">NPS SCORE</text>
  <text x="830" y="345" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#333" letter-spacing="1">TARGET: 75%</text>

  <text x="830" y="460" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#00D4FF" fill-opacity="0.3" letter-spacing="2">LINKED TO STRATEGIC GOAL</text>

  <text x="600" y="575" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#00D4FF" fill-opacity="0.2" letter-spacing="5">KPIs vs METRICS</text>
</svg>
