<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg5" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0d1014"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg5)"/>

  <!-- Large fractional pie / donut chart concept -->
  <!-- Background circle -->
  <circle cx="600" cy="300" r="160" fill="none" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Filled arc — fractional portion (e.g., 40%) -->
  <!-- Using path arc for 40% = 144 degrees, starting from top (-90deg = 270deg) -->
  <!-- 144 degrees arc ending at 270+144 = 414 = 54 degrees -->
  <path d="M 600 140 A 160 160 0 0 1 729.7 380.3" fill="none" stroke="#00D4FF" stroke-opacity="0.7" stroke-width="3"/>
  <!-- Inner filled segment visual -->
  <path d="M 600 300 L 600 140 A 160 160 0 0 1 729.7 380.3 Z" fill="#00D4FF" fill-opacity="0.05" stroke="#00D4FF" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Remaining arc (faint) -->
  <path d="M 729.7 380.3 A 160 160 0 1 1 600 140" fill="none" stroke="#1e1e1e" stroke-width="2"/>

  <!-- Fraction label in center -->
  <text x="600" y="285" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="48" font-weight="700" fill="#00D4FF" fill-opacity="0.7">⅖</text>
  <text x="600" y="330" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#666" letter-spacing="3">OF THE TIME</text>
  <text x="600" y="352" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#444" letter-spacing="2">FULL IMPACT</text>

  <!-- Radiating capability labels -->
  <text x="500" y="175" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#00D4FF" fill-opacity="0.4" letter-spacing="1">STRATEGY</text>
  <text x="770" y="240" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#00D4FF" fill-opacity="0.3" letter-spacing="1">EXECUTION</text>
  <text x="760" y="420" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#444" letter-spacing="1">OPERATIONS</text>
  <text x="430" y="440" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#444" letter-spacing="1">LEADERSHIP</text>
  <text x="380" y="310" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#333" letter-spacing="1">ADVISORY</text>

  <!-- Tick marks on outer ring -->
  <g stroke="#333" stroke-width="1">
    <line x1="600" y1="136" x2="600" y2="126"/>
    <line x1="760" y1="168" x2="766" y2="160"/>
    <line x1="866" y1="300" x2="876" y2="300"/>
    <line x1="760" y1="432" x2="766" y2="440"/>
    <line x1="600" y1="464" x2="600" y2="474"/>
    <line x1="440" y1="432" x2="434" y2="440"/>
    <line x1="334" y1="300" x2="324" y2="300"/>
    <line x1="440" y1="168" x2="434" y2="160"/>
  </g>

  <text x="600" y="565" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="12" fill="#00D4FF" fill-opacity="0.2" letter-spacing="5">FRACTIONAL LEADERSHIP</text>
</svg>
