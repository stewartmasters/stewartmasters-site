<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a12"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Foundation layer — data -->
  <rect x="80" y="430" width="1040" height="100" rx="6" fill="#0a1218" stroke="#1a2a30" stroke-width="1.5"/>
  <text x="600" y="458" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#00D4FF" opacity="0.5" letter-spacing="3" text-anchor="middle">DATA FOUNDATION LAYER</text>

  <!-- Data pillars -->
  <rect x="110" y="470" width="160" height="40" rx="3" fill="#0d1820" stroke="#1a2a3a" stroke-width="1"/>
  <text x="190" y="495" font-family="monospace" font-size="10" fill="#1a4a60" text-anchor="middle">Completeness</text>

  <rect x="290" y="470" width="160" height="40" rx="3" fill="#0d1820" stroke="#1a2a3a" stroke-width="1"/>
  <text x="370" y="495" font-family="monospace" font-size="10" fill="#1a4a60" text-anchor="middle">Consistency</text>

  <rect x="470" y="470" width="160" height="40" rx="3" fill="#0d1820" stroke="#1a2a3a" stroke-width="1"/>
  <text x="550" y="495" font-family="monospace" font-size="10" fill="#1a4a60" text-anchor="middle">Accuracy</text>

  <rect x="650" y="470" width="160" height="40" rx="3" fill="#0d1820" stroke="#1a2a3a" stroke-width="1"/>
  <text x="730" y="495" font-family="monospace" font-size="10" fill="#1a4a60" text-anchor="middle">Accessibility</text>

  <rect x="830" y="470" width="160" height="40" rx="3" fill="#0d1820" stroke="#1a2a3a" stroke-width="1"/>
  <text x="910" y="495" font-family="monospace" font-size="10" fill="#1a4a60" text-anchor="middle">Governance</text>

  <rect x="1010" y="470" width="80" height="40" rx="3" fill="#0d1820" stroke="#1a2a3a" stroke-width="1"/>
  <text x="1050" y="495" font-family="monospace" font-size="10" fill="#1a4a60" text-anchor="middle">...</text>

  <!-- Arrow up from data to AI -->
  <line x1="600" y1="430" x2="600" y2="360" stroke="#00D4FF" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4"/>
  <polygon points="595,362 605,362 600,348" fill="#00D4FF" opacity="0.4"/>

  <!-- AI layer -->
  <rect x="200" y="260" width="800" height="88" rx="6" fill="#0a1418" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
  <text x="600" y="295" font-family="'Space Grotesk', sans-serif" font-size="13" fill="#00D4FF" opacity="0.7" text-anchor="middle" letter-spacing="2">AI APPLICATIONS LAYER</text>

  <!-- AI use case blocks -->
  <rect x="230" y="308" width="160" height="28" rx="3" fill="#0a1f28" stroke="#1a3040" stroke-width="1"/>
  <text x="310" y="326" font-family="monospace" font-size="10" fill="#00D4FF" text-anchor="middle" opacity="0.7">Prediction</text>

  <rect x="410" y="308" width="160" height="28" rx="3" fill="#0a1f28" stroke="#1a3040" stroke-width="1"/>
  <text x="490" y="326" font-family="monospace" font-size="10" fill="#00D4FF" text-anchor="middle" opacity="0.7">Automation</text>

  <rect x="590" y="308" width="160" height="28" rx="3" fill="#0a1f28" stroke="#1a3040" stroke-width="1"/>
  <text x="670" y="326" font-family="monospace" font-size="10" fill="#00D4FF" text-anchor="middle" opacity="0.7">Personalisation</text>

  <rect x="770" y="308" width="200" height="28" rx="3" fill="#0a1f28" stroke="#1a3040" stroke-width="1"/>
  <text x="870" y="326" font-family="monospace" font-size="10" fill="#00D4FF" text-anchor="middle" opacity="0.7">Decision support</text>

  <!-- Problem callout boxes -->
  <rect x="80" y="160" width="220" height="76" rx="4" fill="#1a0a0a" stroke="#3a1a1a" stroke-width="1"/>
  <text x="190" y="182" font-family="monospace" font-size="10" fill="#5a2020" text-anchor="middle">PROBLEM 1</text>
  <text x="190" y="200" font-family="monospace" font-size="10" fill="#4a1818" text-anchor="middle">Siloed systems —</text>
  <text x="190" y="215" font-family="monospace" font-size="10" fill="#4a1818" text-anchor="middle">no single truth</text>
  <text x="190" y="230" font-family="monospace" font-size="10" fill="#3a1010" text-anchor="middle">↑ most common</text>

  <rect x="330" y="160" width="220" height="76" rx="4" fill="#1a0a0a" stroke="#3a1a1a" stroke-width="1"/>
  <text x="440" y="182" font-family="monospace" font-size="10" fill="#5a2020" text-anchor="middle">PROBLEM 2</text>
  <text x="440" y="200" font-family="monospace" font-size="10" fill="#4a1818" text-anchor="middle">Unstructured data —</text>
  <text x="440" y="215" font-family="monospace" font-size="10" fill="#4a1818" text-anchor="middle">costly to clean</text>
  <text x="440" y="230" font-family="monospace" font-size="10" fill="#3a1010" text-anchor="middle">months of work</text>

  <rect x="580" y="160" width="220" height="76" rx="4" fill="#1a0a0a" stroke="#3a1a1a" stroke-width="1"/>
  <text x="690" y="182" font-family="monospace" font-size="10" fill="#5a2020" text-anchor="middle">PROBLEM 3</text>
  <text x="690" y="200" font-family="monospace" font-size="10" fill="#4a1818" text-anchor="middle">Governance gaps —</text>
  <text x="690" y="215" font-family="monospace" font-size="10" fill="#4a1818" text-anchor="middle">legal &amp; ethical risk</text>
  <text x="690" y="230" font-family="monospace" font-size="10" fill="#3a1010" text-anchor="middle">compliance required</text>

  <rect x="830" y="160" width="290" height="76" rx="4" fill="#1a0a0a" stroke="#3a1a1a" stroke-width="1"/>
  <text x="975" y="182" font-family="monospace" font-size="10" fill="#5a2020" text-anchor="middle">PROBLEM 4</text>
  <text x="975" y="200" font-family="monospace" font-size="10" fill="#4a1818" text-anchor="middle">Pipeline doesn't exist —</text>
  <text x="975" y="215" font-family="monospace" font-size="10" fill="#4a1818" text-anchor="middle">data not yet collected</text>
  <text x="975" y="230" font-family="monospace" font-size="10" fill="#3a1010" text-anchor="middle">infra build required first</text>

  <!-- Title -->
  <text x="600" y="80" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#00D4FF" opacity="0.6" letter-spacing="4" text-anchor="middle">AI &amp; TECHNOLOGY</text>
  <text x="600" y="116" font-family="'Space Grotesk', sans-serif" font-size="26" font-weight="700" fill="#fff" opacity="0.9" text-anchor="middle">AI Strategy Needs Data Strategy First</text>

  <!-- Ambient glow -->
  <ellipse cx="600" cy="390" rx="300" ry="60" fill="#00D4FF" opacity="0.02"/>
</svg>
