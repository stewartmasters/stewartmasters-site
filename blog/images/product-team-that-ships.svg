<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0d0a"/>
      <stop offset="100%" style="stop-color:#0d100d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Busy team (left) -->
  <rect x="60" y="155" width="490" height="365" rx="6" fill="#150808" stroke="#2a1010" stroke-width="1.5"/>
  <text x="305" y="183" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#4a2020" text-anchor="middle" letter-spacing="2">BUSY BUT NOT PRODUCTIVE</text>

  <rect x="80" y="200" width="460" height="38" rx="3" fill="#1f0e0e" stroke="#2a1515" stroke-width="1"/>
  <text x="310" y="224" font-family="monospace" font-size="9" fill="#5a2a2a" text-anchor="middle">✗  Outcome unclear — just features on a list</text>

  <rect x="80" y="248" width="460" height="38" rx="3" fill="#1f0e0e" stroke="#2a1515" stroke-width="1"/>
  <text x="310" y="272" font-family="monospace" font-size="9" fill="#5a2a2a" text-anchor="middle">✗  Constant reprioritisation from leadership</text>

  <rect x="80" y="296" width="460" height="38" rx="3" fill="#1f0e0e" stroke="#2a1515" stroke-width="1"/>
  <text x="310" y="320" font-family="monospace" font-size="9" fill="#5a2a2a" text-anchor="middle">✗  Decisions wait for consensus that never comes</text>

  <rect x="80" y="344" width="460" height="38" rx="3" fill="#1f0e0e" stroke="#2a1515" stroke-width="1"/>
  <text x="310" y="368" font-family="monospace" font-size="9" fill="#5a2a2a" text-anchor="middle">✗  PM adds everything to backlog to avoid saying no</text>

  <rect x="80" y="392" width="460" height="38" rx="3" fill="#1f0e0e" stroke="#2a1515" stroke-width="1"/>
  <text x="310" y="416" font-family="monospace" font-size="9" fill="#5a2a2a" text-anchor="middle">✗  Everything is "almost done" — nothing is live</text>

  <rect x="80" y="448" width="460" height="36" rx="3" fill="#100505" stroke="#1a0808" stroke-width="1"/>
  <text x="310" y="471" font-family="monospace" font-size="9" fill="#3a1010" text-anchor="middle">Result: perpetually busy, perpetually behind</text>

  <!-- Shipping team (right) -->
  <rect x="650" y="155" width="490" height="365" rx="6" fill="#0a1a0a" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
  <text x="895" y="183" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#00D4FF" text-anchor="middle" letter-spacing="2" opacity="0.8">TEAM THAT ACTUALLY SHIPS</text>

  <rect x="670" y="200" width="460" height="38" rx="3" fill="#0d1f0d" stroke="#1a3018" stroke-width="1"/>
  <text x="900" y="224" font-family="monospace" font-size="9" fill="#2a7030" text-anchor="middle">✓  Outcome-first: what metric moves this quarter?</text>

  <rect x="670" y="248" width="460" height="38" rx="3" fill="#0d1f0d" stroke="#1a3018" stroke-width="1"/>
  <text x="900" y="272" font-family="monospace" font-size="9" fill="#2a7030" text-anchor="middle">✓  Decision rights owned — PM, Eng, Design clear</text>

  <rect x="670" y="296" width="460" height="38" rx="3" fill="#0d1f0d" stroke="#1a3018" stroke-width="1"/>
  <text x="900" y="320" font-family="monospace" font-size="9" fill="#2a7030" text-anchor="middle">✓  Small batches, short cycles — scope cut aggressively</text>

  <rect x="670" y="344" width="460" height="38" rx="3" fill="#0d1f0d" stroke="#1a3018" stroke-width="1"/>
  <text x="900" y="368" font-family="monospace" font-size="9" fill="#2a7030" text-anchor="middle">✓  PM filters noise — protects engineering focus</text>

  <rect x="670" y="392" width="460" height="38" rx="3" fill="#0d1f0d" stroke="#1a3018" stroke-width="1"/>
  <text x="900" y="416" font-family="monospace" font-size="9" fill="#2a7030" text-anchor="middle">✓  Done = live + monitored, not "almost ready"</text>

  <rect x="670" y="448" width="460" height="36" rx="3" fill="#081208" stroke="#101a10" stroke-width="1"/>
  <text x="900" y="471" font-family="monospace" font-size="9" fill="#1a5020" text-anchor="middle">Result: shipped, learned, corrected — repeat</text>

  <!-- VS divider -->
  <line x1="600" y1="155" x2="600" y2="520" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="6,6"/>
  <circle cx="600" cy="338" r="22" fill="#0d0d0d" stroke="#1a1a1a" stroke-width="1"/>
  <text x="600" y="344" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#333" text-anchor="middle" font-weight="700">VS</text>

  <!-- Title -->
  <text x="600" y="72" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#00D4FF" opacity="0.6" letter-spacing="4" text-anchor="middle">LEADERSHIP</text>
  <text x="600" y="108" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="700" fill="#fff" opacity="0.9" text-anchor="middle">Building a Product Team That Ships</text>

  <ellipse cx="895" cy="338" rx="200" ry="150" fill="#00D4FF" opacity="0.01"/>
</svg>
