<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg-pee" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0e0e18"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <radialGradient id="glow-pee" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-pee)"/>
  <ellipse cx="600" cy="315" rx="360" ry="250" fill="url(#glow-pee)"/>

  <!-- Prompt box (terminal-like) -->
  <rect x="390" y="175" width="420" height="280" rx="8" fill="#00D4FF" fill-opacity="0.03" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1.5"/>

  <!-- Terminal header bar -->
  <rect x="390" y="175" width="420" height="28" rx="8" fill="#00D4FF" fill-opacity="0.06" stroke="none"/>
  <rect x="390" y="195" width="420" height="8" fill="#00D4FF" fill-opacity="0.06" stroke="none"/>
  <circle cx="410" cy="189" r="5" fill="#00D4FF" fill-opacity="0.2"/>
  <circle cx="428" cy="189" r="5" fill="#00D4FF" fill-opacity="0.15"/>
  <circle cx="446" cy="189" r="5" fill="#00D4FF" fill-opacity="0.1"/>

  <!-- Prompt content lines -->
  <!-- Role component -->
  <text x="410" y="228" font-family="monospace" font-size="10" fill="#00D4FF" fill-opacity="0.5">ROLE:</text>
  <rect x="450" y="217" width="140" height="16" rx="2" fill="#00D4FF" fill-opacity="0.08" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="0.8"/>
  <text x="458" y="229" font-family="monospace" font-size="9" fill="#00D4FF" fill-opacity="0.6">expert analyst</text>

  <!-- Context component -->
  <text x="410" y="258" font-family="monospace" font-size="10" fill="#00D4FF" fill-opacity="0.5">CONTEXT:</text>
  <rect x="475" y="247" width="200" height="16" rx="2" fill="#00D4FF" fill-opacity="0.06" stroke="#00D4FF" stroke-opacity="0.15" stroke-width="0.8"/>
  <rect x="475" y="267" width="160" height="12" rx="2" fill="#00D4FF" fill-opacity="0.04" stroke="#00D4FF" stroke-opacity="0.1" stroke-width="0.8"/>

  <!-- Task component -->
  <text x="410" y="302" font-family="monospace" font-size="10" fill="#00D4FF" fill-opacity="0.5">TASK:</text>
  <rect x="450" y="291" width="220" height="16" rx="2" fill="#00D4FF" fill-opacity="0.06" stroke="#00D4FF" stroke-opacity="0.15" stroke-width="0.8"/>

  <!-- Format component -->
  <text x="410" y="338" font-family="monospace" font-size="10" fill="#00D4FF" fill-opacity="0.5">FORMAT:</text>
  <rect x="470" y="327" width="100" height="16" rx="2" fill="#00D4FF" fill-opacity="0.06" stroke="#00D4FF" stroke-opacity="0.15" stroke-width="0.8"/>
  <text x="477" y="339" font-family="monospace" font-size="9" fill="#00D4FF" fill-opacity="0.45">bullet points</text>

  <!-- Cursor blink -->
  <rect x="410" y="380" width="8" height="16" rx="1" fill="#00D4FF" fill-opacity="0.5"/>

  <!-- Output arrow -->
  <path d="M 820 315 L 860 315 M 853 308 L 860 315 L 853 322" fill="none" stroke="#00D4FF" stroke-opacity="0.3" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Output box (right) -->
  <rect x="870" y="280" width="100" height="70" rx="6" fill="#00D4FF" fill-opacity="0.05" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="882" y1="300" x2="958" y2="300" stroke="#00D4FF" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="882" y1="315" x2="948" y2="315" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="882" y1="330" x2="958" y2="330" stroke="#00D4FF" stroke-opacity="0.15" stroke-width="1"/>

  <text x="600" y="570" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="12" fill="#00D4FF" fill-opacity="0.25" letter-spacing="5">PROMPT ENGINEERING</text>
</svg>
