<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0e110a"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg3)"/>

  <!-- Broken/fragmented grid structure -->
  <!-- Left intact side -->
  <g stroke="#00D4FF" stroke-opacity="0.15" stroke-width="1" fill="none">
    <rect x="100" y="160" width="220" height="140" rx="4"/>
    <rect x="100" y="320" width="220" height="140" rx="4"/>
    <line x1="100" y1="230" x2="320" y2="230"/>
    <line x1="210" y1="160" x2="210" y2="460"/>
  </g>

  <!-- Connected arrows left side -->
  <line x1="320" y1="230" x2="420" y2="230" stroke="#00D4FF" stroke-opacity="0.3" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="320" y1="390" x2="420" y2="330" stroke="#00D4FF" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Center fracture -->
  <line x1="580" y1="80" x2="540" y2="580" stroke="#ff6644" stroke-opacity="0.15" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Right fragmented side -->
  <g stroke="#444" stroke-opacity="0.25" stroke-width="1" fill="none">
    <!-- Broken rectangles -->
    <path d="M650,150 L820,150 L820,240" fill="none"/>
    <path d="M650,240 L700,240" fill="none"/>
    <!-- Floating fragment -->
    <rect x="680" y="280" width="80" height="60" rx="3" stroke-opacity="0.2"/>
    <!-- Another fragment -->
    <rect x="820" y="200" width="120" height="80" rx="3" stroke-opacity="0.15"/>
    <!-- Disconnected bottom -->
    <rect x="700" y="400" width="160" height="90" rx="3" stroke-opacity="0.12"/>
  </g>

  <!-- Broken connection lines -->
  <line x1="760" y1="240" x2="760" y2="280" stroke="#444" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="3 5"/>
  <line x1="880" y1="280" x2="840" y2="400" stroke="#333" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="2 6"/>

  <!-- X marks on right side -->
  <g stroke="#ff4444" stroke-opacity="0.2" stroke-width="1.5">
    <line x1="700" y1="160" x2="720" y2="180"/>
    <line x1="720" y1="160" x2="700" y2="180"/>
    <line x1="870" y1="220" x2="890" y2="240"/>
    <line x1="890" y1="220" x2="870" y2="240"/>
  </g>

  <!-- Central message area -->
  <text x="600" y="510" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#888" fill-opacity="0.3" letter-spacing="4">PLAN · REALITY</text>

  <!-- Percentage stat -->
  <text x="600" y="315" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="72" font-weight="700" fill="#00D4FF" fill-opacity="0.06">70%</text>
  <text x="600" y="345" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#666" fill-opacity="0.4" letter-spacing="3">FAIL RATE</text>

  <!-- Top label -->
  <text x="600" y="565" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="13" fill="#888" fill-opacity="0.3" letter-spacing="5">DIGITAL TRANSFORMATION</text>
</svg>
