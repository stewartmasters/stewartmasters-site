<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bgbm" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0d0d10"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgbm)"/>

  <!-- Board table — oval -->
  <ellipse cx="600" cy="320" rx="320" ry="150" fill="#0e0e12" stroke="#1e1e2e" stroke-width="1.5"/>
  <ellipse cx="600" cy="320" rx="300" ry="130" fill="none" stroke="#1a1a24" stroke-width="1"/>

  <!-- Seat positions — 8 seats around oval -->
  <!-- Top seats -->
  <circle cx="500" cy="180" r="20" fill="#111" stroke="#1e1e2e" stroke-width="1.5"/>
  <circle cx="600" cy="165" r="20" fill="#111" stroke="#1e1e2e" stroke-width="1.5"/>
  <circle cx="700" cy="180" r="20" fill="#111" stroke="#1e1e2e" stroke-width="1.5"/>
  <!-- Bottom seats -->
  <circle cx="500" cy="460" r="20" fill="#111" stroke="#1e1e2e" stroke-width="1.5"/>
  <circle cx="600" cy="475" r="20" fill="#111" stroke="#1e1e2e" stroke-width="1.5"/>
  <circle cx="700" cy="460" r="20" fill="#111" stroke="#1e1e2e" stroke-width="1.5"/>
  <!-- Side seats -->
  <circle cx="285" cy="320" r="20" fill="#111" stroke="#1e1e2e" stroke-width="1.5"/>
  <circle cx="915" cy="320" r="20" fill="#111" stroke="#00D4FF" stroke-opacity="0.4" stroke-width="1.5"/>

  <!-- Highlighted seat label — chair -->
  <text x="915" y="356" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#00D4FF" fill-opacity="0.4" letter-spacing="1">CHAIR</text>

  <!-- Agenda doc on table -->
  <rect x="535" y="275" width="130" height="90" rx="4" fill="#0e0e14" stroke="#00D4FF" stroke-opacity="0.25" stroke-width="1"/>
  <text x="600" y="298" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#00D4FF" fill-opacity="0.4" letter-spacing="2">AGENDA</text>
  <rect x="548" y="308" width="80" height="4" rx="2" fill="#334" fill-opacity="0.5"/>
  <rect x="548" y="320" width="60" height="4" rx="2" fill="#334" fill-opacity="0.4"/>
  <rect x="548" y="332" width="70" height="4" rx="2" fill="#334" fill-opacity="0.3"/>
  <rect x="548" y="344" width="50" height="4" rx="2" fill="#334" fill-opacity="0.2"/>

  <!-- Time indicator — clock -->
  <circle cx="390" cy="220" r="35" fill="none" stroke="#1e1e2e" stroke-width="1"/>
  <circle cx="390" cy="220" r="3" fill="#333"/>
  <line x1="390" y1="220" x2="390" y2="196" stroke="#00D4FF" stroke-opacity="0.3" stroke-width="1.5"/>
  <line x1="390" y1="220" x2="408" y2="228" stroke="#555" stroke-width="1"/>
  <text x="390" y="275" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#444" letter-spacing="1">90 MIN</text>

  <!-- Decision outcomes floating -->
  <rect x="780" y="210" width="130" height="26" rx="4" fill="#0a100a" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1"/>
  <text x="845" y="227" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#00D4FF" fill-opacity="0.5" letter-spacing="1">DECISION MADE ✓</text>

  <rect x="790" y="248" width="110" height="26" rx="4" fill="#0a100a" stroke="#00D4FF" stroke-opacity="0.15" stroke-width="1"/>
  <text x="845" y="265" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#445" letter-spacing="1">OWNER NAMED ✓</text>

  <rect x="800" y="286" width="90" height="26" rx="4" fill="#0a100a" stroke="#00D4FF" stroke-opacity="0.1" stroke-width="1"/>
  <text x="845" y="303" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#333" letter-spacing="1">DATE SET ✓</text>

  <text x="600" y="565" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#00D4FF" fill-opacity="0.2" letter-spacing="5">THE BOARD MEETING</text>
</svg>
