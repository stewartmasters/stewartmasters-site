<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg10" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0d100d"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg10)"/>

  <!-- Ascending path / staircase concept -->
  <!-- Step grid base -->
  <g fill="none">
    <!-- Step 1 — bottom left -->
    <rect x="160" y="430" width="120" height="60" fill="#0e120e" stroke="#1a1e1a" stroke-width="1"/>
    <text x="220" y="456" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#445" letter-spacing="1">01</text>
    <text x="220" y="474" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#445">EXPERTISE</text>

    <!-- Step 2 -->
    <rect x="310" y="370" width="120" height="120" fill="#0e120e" stroke="#1a1e1a" stroke-width="1"/>
    <text x="370" y="396" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#445" letter-spacing="1">02</text>
    <text x="370" y="414" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#445">VISIBILITY</text>

    <!-- Step 3 -->
    <rect x="460" y="310" width="120" height="180" fill="#0e120e" stroke="#1a1e1a" stroke-width="1"/>
    <text x="520" y="336" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#445" letter-spacing="1">03</text>
    <text x="520" y="354" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#445">NETWORK</text>

    <!-- Step 4 -->
    <rect x="610" y="250" width="120" height="240" fill="#0e120e" stroke="#1a1e1a" stroke-width="1"/>
    <text x="670" y="276" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#445" letter-spacing="1">04</text>
    <text x="670" y="294" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#445">POSITIONING</text>

    <!-- Step 5 — top, glowing -->
    <rect x="760" y="180" width="120" height="310" fill="#0a140a" stroke="#00D4FF" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="820" y="206" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#00D4FF" fill-opacity="0.6" letter-spacing="1">05</text>
    <text x="820" y="224" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#00D4FF" fill-opacity="0.6">FIRST ROLE</text>
  </g>

  <!-- Arrow on top of step 5 -->
  <polygon points="820,155 808,175 832,175" fill="#00D4FF" fill-opacity="0.5"/>

  <!-- Rising line connecting step tops -->
  <path d="M 160 430 L 280 430 L 280 370 L 460 370 L 460 310 L 610 310 L 610 250 L 760 250 L 760 180" fill="none" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- Bar chart value marks on side -->
  <g stroke="#1e1e1e" stroke-width="1">
    <line x1="140" y1="430" x2="160" y2="430"/>
    <line x1="140" y1="370" x2="160" y2="370"/>
    <line x1="140" y1="310" x2="160" y2="310"/>
    <line x1="140" y1="250" x2="160" y2="250"/>
    <line x1="140" y1="180" x2="160" y2="180"/>
    <line x1="140" y1="180" x2="140" y2="490"/>
    <line x1="140" y1="490" x2="920" y2="490"/>
  </g>

  <!-- Axis labels -->
  <text x="130" y="434" text-anchor="end" font-family="monospace" font-size="9" fill="#333">1</text>
  <text x="130" y="374" text-anchor="end" font-family="monospace" font-size="9" fill="#333">2</text>
  <text x="130" y="314" text-anchor="end" font-family="monospace" font-size="9" fill="#333">3</text>
  <text x="130" y="254" text-anchor="end" font-family="monospace" font-size="9" fill="#333">4</text>
  <text x="130" y="184" text-anchor="end" font-family="monospace" font-size="9" fill="#00D4FF" fill-opacity="0.4">5</text>

  <text x="600" y="565" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="12" fill="#00D4FF" fill-opacity="0.22" letter-spacing="5">BOARD ADVISOR PATHWAY</text>
</svg>
