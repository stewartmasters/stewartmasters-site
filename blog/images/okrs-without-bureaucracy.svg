  <rect x="888" y="388" width="150" height="3" rx="1" fill="#121212"/>
  <rect x="888" y="398" width="120" height="3" rx="1" fill="#121212"/>
  <rect x="888" y="408" width="108" height="3" rx="1" fill="#111111"/>
  <rect x="888" y="418" width="155" height="3" rx="1" fill="#111111"/>
  <rect x="888" y="428" width="130" height="3" rx="1" fill="#101010"/>
  <rect x="888" y="438" width="95" height="3" rx="1" fill="#101010"/>
  <rect x="888" y="448" width="145" height="3" rx="1" fill="#0f0f0f"/>
  <rect x="888" y="458" width="120" height="3" rx="1" fill="#0f0f0f"/>
  <text x="1000" y="495" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#2a2a2a" letter-spacing="1">OKR #47 of 52...</text>

  <text x="600" y="575" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#00D4FF" fill-opacity="0.2" letter-spacing="5">OKRs WITHOUT BUREAUCRACY</text>
</svg>
