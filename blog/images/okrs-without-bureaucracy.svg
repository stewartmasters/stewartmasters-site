<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bgokr" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0a0c0a"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgokr)"/>

  <!-- Concentric target circles — large bullseye -->
  <circle cx="600" cy="315" r="230" fill="none" stroke="#141414" stroke-width="1.5"/>
  <circle cx="600" cy="315" r="185" fill="none" stroke="#161616" stroke-width="1"/>
  <circle cx="600" cy="315" r="140" fill="none" stroke="#00D4FF" stroke-opacity="0.08" stroke-width="1.5"/>
  <circle cx="600" cy="315" r="95" fill="none" stroke="#00D4FF" stroke-opacity="0.15" stroke-width="2"/>
  <circle cx="600" cy="315" r="50" fill="#00D4FF" fill-opacity="0.05" stroke="#00D4FF" stroke-opacity="0.3" stroke-width="2"/>

  <!-- Center: O label -->
  <text x="600" y="310" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="16" fill="#00D4FF" fill-opacity="0.6" font-weight="700">O</text>
  <text x="600" y="328" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#00D4FF" fill-opacity="0.35" letter-spacing="2">OBJECTIVE</text>

  <!-- KR labels on the rings -->
  <!-- KR1 — top right of inner ring -->
  <text x="680" y="230" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#00D4FF" fill-opacity="0.45">KR1</text>
  <line x1="668" y1="235" x2="638" y2="268" stroke="#00D4FF" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="680" y="246" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#334" letter-spacing="1">Measurable</text>
  <text x="680" y="258" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#2a2a2a" letter-spacing="1">Time-bound</text>

  <!-- KR2 — bottom right -->
  <text x="700" y="400" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#00D4FF" fill-opacity="0.35">KR2</text>
  <line x1="683" y1="393" x2="648" y2="362" stroke="#00D4FF" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="700" y="416" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#2a2a2a" letter-spacing="1">Owner assigned</text>

  <!-- KR3 — left -->
  <text x="475" y="350" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#00D4FF" fill-opacity="0.3">KR3</text>
  <line x1="510" y1="348" x2="550" y2="330" stroke="#00D4FF" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="450" y="366" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#222" letter-spacing="1">Weekly check-in</text>

  <!-- Simplicity indicator — 3 items only -->
  <text x="600" y="185" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#333" letter-spacing="2">3 KEY RESULTS MAX</text>

  <!-- Contrast: bureaucracy pile on right -->
  <text x="1000" y="200" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#2a2a2a" letter-spacing="1">vs bureaucratic OKR</text>
  <rect x="870" y="220" width="260" height="280" rx="4" fill="#0a0a0a" stroke="#141414" stroke-width="1"/>
  <!-- Many lines suggesting overloaded OKR -->
  <rect x="888" y="238" width="100" height="3" rx="1" fill="#1a1a1a"/>
  <rect x="888" y="248" width="160" height="3" rx="1" fill="#191919"/>
  <rect x="888" y="258" width="130" height="3" rx="1" fill="#181818"/>
  <rect x="888" y="268" width="145" height="3" rx="1" fill="#181818"/>
  <rect x="888" y="278" width="110" height="3" rx="1" fill="#171717"/>
  <rect x="888" y="293" width="120" height="3" rx="1" fill="#171717"/>
  <rect x="888" y="303" width="155" height="3" rx="1" fill="#161616"/>
  <rect x="888" y="313" width="95" height="3" rx="1" fill="#161616"/>
  <rect x="888" y="323" width="140" height="3" rx="1" fill="#151515"/>
  <rect x="888" y="333" width="115" height="3" rx="1" fill="#151515"/>
  <rect x="888" y="343" width="160" height="3" rx="1" fill="#141414"/>
  <rect x="888" y="353" width="90" height="3" rx="1" fill="#141414"/>
  <rect x="888" y="363" width="135" height="3" rx="1" fill="#131313"/>
