<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bgabc" cx="45%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0a0d0f"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgabc)"/>

  <!-- Document body -->
  <rect x="360" y="110" width="280" height="380" rx="6" fill="#0e1214" stroke="#1e2428" stroke-width="1.5"/>
  <!-- Document header bar -->
  <rect x="360" y="110" width="280" height="40" rx="6" fill="#101820" stroke="#1e2428" stroke-width="0"/>
  <rect x="360" y="135" width="280" height="15" fill="#101820"/>
  <text x="500" y="136" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#00D4FF" fill-opacity="0.5" letter-spacing="2">AI BUSINESS CASE</text>

  <!-- Document lines -->
  <rect x="385" y="165" width="120" height="5" rx="2" fill="#1a2030" fill-opacity="0.8"/>
  <rect x="385" y="178" width="200" height="4" rx="2" fill="#1a2030" fill-opacity="0.5"/>
  <rect x="385" y="190" width="180" height="4" rx="2" fill="#1a2030" fill-opacity="0.4"/>
  <rect x="385" y="202" width="210" height="4" rx="2" fill="#1a2030" fill-opacity="0.3"/>

  <!-- ROI chart section -->
  <rect x="385" y="225" width="230" height="80" rx="3" fill="#090d12" stroke="#1e2428" stroke-width="1"/>
  <text x="500" y="242" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#00D4FF" fill-opacity="0.35" letter-spacing="2">PROJECTED ROI</text>
  <!-- Bar chart bars -->
  <rect x="410" y="288" width="20" height="25" rx="1" fill="#00D4FF" fill-opacity="0.15"/>
  <rect x="440" y="272" width="20" height="41" rx="1" fill="#00D4FF" fill-opacity="0.25"/>
  <rect x="470" y="258" width="20" height="55" rx="1" fill="#00D4FF" fill-opacity="0.35"/>
  <rect x="500" y="248" width="20" height="65" rx="1" fill="#00D4FF" fill-opacity="0.5"/>
  <rect x="530" y="238" width="20" height="75" rx="1" fill="#00D4FF" fill-opacity="0.7"/>
  <rect x="560" y="228" width="20" height="85" rx="1" fill="#00D4FF" fill-opacity="0.85"/>

  <!-- More doc lines -->
  <rect x="385" y="320" width="200" height="4" rx="2" fill="#1a2030" fill-opacity="0.4"/>
  <rect x="385" y="332" width="160" height="4" rx="2" fill="#1a2030" fill-opacity="0.35"/>
  <rect x="385" y="344" width="185" height="4" rx="2" fill="#1a2030" fill-opacity="0.3"/>
  <rect x="385" y="370" width="110" height="4" rx="2" fill="#1a2030" fill-opacity="0.25"/>
  <rect x="385" y="382" width="170" height="4" rx="2" fill="#1a2030" fill-opacity="0.2"/>
  <rect x="385" y="394" width="130" height="4" rx="2" fill="#1a2030" fill-opacity="0.15"/>

  <!-- Approval stamp / process -->
  <!-- Arrow right -->
  <line x1="650" y1="315" x2="700" y2="315" stroke="#1e2428" stroke-width="1.5"/>
  <polygon points="700,309 712,315 700,321" fill="#1e2428"/>

  <!-- Review box -->
  <rect x="715" y="280" width="120" height="70" rx="5" fill="#0e1010" stroke="#222" stroke-width="1"/>
  <text x="775" y="305" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#555" letter-spacing="2">REVIEW</text>
  <rect x="730" y="315" width="90" height="4" rx="2" fill="#1e1e1e"/>
  <rect x="730" y="326" width="65" height="4" rx="2" fill="#1a1a1a"/>

  <!-- Arrow right -->
  <line x1="838" y1="315" x2="888" y2="315" stroke="#00D4FF" stroke-opacity="0.25" stroke-width="1.5"/>
  <polygon points="888,309 900,315 888,321" fill="#00D4FF" fill-opacity="0.25"/>

  <!-- Approved box -->
  <rect x="903" y="280" width="130" height="70" rx="5" fill="#081410" stroke="#00D4FF" stroke-opacity="0.35" stroke-width="1"/>
  <text x="968" y="305" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#00D4FF" fill-opacity="0.6" letter-spacing="2">APPROVED</text>
  <!-- Checkmark -->
  <polyline points="940,328 958,342 998,310" fill="none" stroke="#00D4FF" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Budget figure -->
  <text x="968" y="365" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#00D4FF" fill-opacity="0.3" font-weight="bold">£240k</text>
  <text x="968" y="380" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#444" letter-spacing="1">APPROVED BUDGET</text>

  <text x="600" y="575" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#00D4FF" fill-opacity="0.2" letter-spacing="5">AI BUSINESS CASE</text>
</svg>
