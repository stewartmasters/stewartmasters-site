<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0e1a20"/>
      <stop offset="100%" stop-color="#080c0e"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <!-- Central glow -->
  <ellipse cx="600" cy="315" rx="400" ry="280" fill="url(#glow1)"/>

  <!-- Network connections -->
  <g stroke="#00D4FF" stroke-opacity="0.12" stroke-width="1" fill="none">
    <line x1="600" y1="315" x2="200" y2="160"/>
    <line x1="600" y1="315" x2="950" y2="200"/>
    <line x1="600" y1="315" x2="150" y2="450"/>
    <line x1="600" y1="315" x2="1000" y2="480"/>
    <line x1="600" y1="315" x2="400" y2="520"/>
    <line x1="600" y1="315" x2="820" y2="540"/>
    <line x1="600" y1="315" x2="380" y2="120"/>
    <line x1="600" y1="315" x2="780" y2="100"/>
    <!-- Secondary connections -->
    <line x1="200" y1="160" x2="380" y2="120"/>
    <line x1="200" y1="160" x2="150" y2="450"/>
    <line x1="950" y1="200" x2="780" y2="100"/>
    <line x1="950" y1="200" x2="1000" y2="480"/>
    <line x1="400" y1="520" x2="150" y2="450"/>
    <line x1="820" y1="540" x2="1000" y2="480"/>
  </g>

  <!-- Animated-style circles at nodes -->
  <!-- Central node -->
  <circle cx="600" cy="315" r="28" fill="#00D4FF" fill-opacity="0.08" stroke="#00D4FF" stroke-opacity="0.5" stroke-width="1.5"/>
  <circle cx="600" cy="315" r="18" fill="#00D4FF" fill-opacity="0.15" stroke="#00D4FF" stroke-opacity="0.7" stroke-width="1"/>
  <circle cx="600" cy="315" r="7" fill="#00D4FF"/>

  <!-- Satellite nodes -->
  <circle cx="200" cy="160" r="12" fill="#00D4FF" fill-opacity="0.1" stroke="#00D4FF" stroke-opacity="0.4" stroke-width="1"/>
  <circle cx="200" cy="160" r="5" fill="#00D4FF" fill-opacity="0.7"/>

  <circle cx="950" cy="200" r="15" fill="#00D4FF" fill-opacity="0.1" stroke="#00D4FF" stroke-opacity="0.4" stroke-width="1"/>
  <circle cx="950" cy="200" r="6" fill="#00D4FF" fill-opacity="0.7"/>

  <circle cx="150" cy="450" r="10" fill="#00D4FF" fill-opacity="0.1" stroke="#00D4FF" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="150" cy="450" r="4" fill="#00D4FF" fill-opacity="0.5"/>

  <circle cx="1000" cy="480" r="13" fill="#00D4FF" fill-opacity="0.1" stroke="#00D4FF" stroke-opacity="0.4" stroke-width="1"/>
  <circle cx="1000" cy="480" r="5" fill="#00D4FF" fill-opacity="0.6"/>

  <circle cx="400" cy="520" r="9" fill="#00D4FF" fill-opacity="0.08" stroke="#00D4FF" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="400" cy="520" r="3.5" fill="#00D4FF" fill-opacity="0.5"/>

  <circle cx="820" cy="540" r="11" fill="#00D4FF" fill-opacity="0.1" stroke="#00D4FF" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="820" cy="540" r="4.5" fill="#00D4FF" fill-opacity="0.5"/>

  <circle cx="380" cy="120" r="8" fill="#00D4FF" fill-opacity="0.08" stroke="#00D4FF" stroke-opacity="0.25" stroke-width="1"/>
  <circle cx="380" cy="120" r="3" fill="#00D4FF" fill-opacity="0.4"/>

  <circle cx="780" cy="100" r="9" fill="#00D4FF" fill-opacity="0.08" stroke="#00D4FF" stroke-opacity="0.25" stroke-width="1"/>
  <circle cx="780" cy="100" r="3.5" fill="#00D4FF" fill-opacity="0.4"/>

  <!-- Label for central node -->
  <text x="600" y="358" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#00D4FF" fill-opacity="0.6" letter-spacing="3">AGENT</text>

  <!-- Orbit rings -->
  <circle cx="600" cy="315" r="80" fill="none" stroke="#00D4FF" stroke-opacity="0.06" stroke-width="1" stroke-dasharray="4 6"/>
  <circle cx="600" cy="315" r="160" fill="none" stroke="#00D4FF" stroke-opacity="0.04" stroke-width="1" stroke-dasharray="3 8"/>

  <!-- Top label -->
  <text x="600" y="560" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="13" fill="#00D4FF" fill-opacity="0.35" letter-spacing="5">AGENTIC AI</text>
</svg>
