<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg9" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d0d10"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <linearGradient id="divider9" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00D4FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg9)"/>

  <!-- Divider line -->
  <line x1="600" y1="120" x2="600" y2="520" stroke="url(#divider9)" stroke-width="1"/>

  <!-- Left side — Board Advisor -->
  <text x="300" y="165" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="16" font-weight="600" fill="#00D4FF" fill-opacity="0.6" letter-spacing="2">BOARD ADVISOR</text>

  <!-- Advisor attributes as stacked items -->
  <g font-family="'Space Grotesk', sans-serif">
    <rect x="120" y="195" width="360" height="44" rx="4" fill="#111" stroke="#1e1e1e" stroke-width="1"/>
    <text x="300" y="222" text-anchor="middle" font-size="13" fill="#EAEAEA" fill-opacity="0.65">Informal influence</text>

    <rect x="120" y="251" width="360" height="44" rx="4" fill="#111" stroke="#1e1e1e" stroke-width="1"/>
    <text x="300" y="278" text-anchor="middle" font-size="13" fill="#EAEAEA" fill-opacity="0.65">No fiduciary duty</text>

    <rect x="120" y="307" width="360" height="44" rx="4" fill="#111" stroke="#1e1e1e" stroke-width="1"/>
    <text x="300" y="334" text-anchor="middle" font-size="13" fill="#EAEAEA" fill-opacity="0.65">Specific expertise focus</text>

    <rect x="120" y="363" width="360" height="44" rx="4" fill="#111" stroke="#1e1e1e" stroke-width="1"/>
    <text x="300" y="390" text-anchor="middle" font-size="13" fill="#EAEAEA" fill-opacity="0.65">Flexible engagement</text>

    <rect x="120" y="419" width="360" height="44" rx="4" fill="#0a0d0a" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1"/>
    <text x="300" y="446" text-anchor="middle" font-size="13" fill="#00D4FF" fill-opacity="0.5">No legal liability</text>
  </g>

  <!-- Right side — NED -->
  <text x="900" y="165" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="16" font-weight="600" fill="#888" letter-spacing="2">NON-EXEC DIRECTOR</text>

  <g font-family="'Space Grotesk', sans-serif">
    <rect x="720" y="195" width="360" height="44" rx="4" fill="#111" stroke="#1e1e1e" stroke-width="1"/>
    <text x="900" y="222" text-anchor="middle" font-size="13" fill="#EAEAEA" fill-opacity="0.65">Formal board seat</text>

    <rect x="720" y="251" width="360" height="44" rx="4" fill="#111" stroke="#1e1e1e" stroke-width="1"/>
    <text x="900" y="278" text-anchor="middle" font-size="13" fill="#EAEAEA" fill-opacity="0.65">Fiduciary duty</text>

    <rect x="720" y="307" width="360" height="44" rx="4" fill="#111" stroke="#1e1e1e" stroke-width="1"/>
    <text x="900" y="334" text-anchor="middle" font-size="13" fill="#EAEAEA" fill-opacity="0.65">Broad governance role</text>

    <rect x="720" y="363" width="360" height="44" rx="4" fill="#111" stroke="#1e1e1e" stroke-width="1"/>
    <text x="900" y="390" text-anchor="middle" font-size="13" fill="#EAEAEA" fill-opacity="0.65">Regular commitment</text>

    <rect x="720" y="419" width="360" height="44" rx="4" fill="#110a0a" stroke="#ff4444" stroke-opacity="0.15" stroke-width="1"/>
    <text x="900" y="446" text-anchor="middle" font-size="13" fill="#ff8888" fill-opacity="0.4">Legal responsibility</text>
  </g>

  <!-- VS badge in centre -->
  <circle cx="600" cy="315" r="28" fill="#0d0d10" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1"/>
  <text x="600" y="321" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="700" fill="#555">VS</text>

  <text x="600" y="565" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#00D4FF" fill-opacity="0.2" letter-spacing="5">ROLES COMPARED</text>
</svg>
