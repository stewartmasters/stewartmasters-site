<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bghpm" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0d0d10"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bghpm)"/>

  <!-- Candidate cards — left column (wrong hires) -->
  <rect x="140" y="180" width="220" height="130" rx="6" fill="#111" stroke="#1e1e1e" stroke-width="1"/>
  <text x="155" y="208" font-family="sans-serif" font-size="9" fill="#444" letter-spacing="2">CANDIDATE A</text>
  <rect x="155" y="218" width="140" height="6" rx="2" fill="#222"/>
  <rect x="155" y="232" width="100" height="6" rx="2" fill="#1e1e1e"/>
  <rect x="155" y="255" width="60" height="20" rx="3" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="165" y="268" font-family="sans-serif" font-size="8" fill="#333" letter-spacing="1">TALKS</text>
  <rect x="225" y="255" width="60" height="20" rx="3" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="233" y="268" font-family="sans-serif" font-size="8" fill="#333" letter-spacing="1">DECKS</text>
  <line x1="155" y1="290" x2="345" y2="290" stroke="#1e1e1e" stroke-width="1"/>
  <text x="155" y="303" font-family="sans-serif" font-size="9" fill="#333" letter-spacing="1">No shipped product</text>

  <rect x="140" y="330" width="220" height="130" rx="6" fill="#111" stroke="#1e1e1e" stroke-width="1"/>
  <text x="155" y="358" font-family="sans-serif" font-size="9" fill="#444" letter-spacing="2">CANDIDATE B</text>
  <rect x="155" y="368" width="160" height="6" rx="2" fill="#222"/>
  <rect x="155" y="382" width="120" height="6" rx="2" fill="#1e1e1e"/>
  <rect x="155" y="405" width="80" height="20" rx="3" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="161" y="418" font-family="sans-serif" font-size="8" fill="#333" letter-spacing="1">FRAMEWORK</text>
  <line x1="155" y1="440" x2="345" y2="440" stroke="#1e1e1e" stroke-width="1"/>
  <text x="155" y="453" font-family="sans-serif" font-size="9" fill="#333" letter-spacing="1">PM certified, nothing shipped</text>

  <!-- Divider arrow -->
  <line x1="420" y1="315" x2="540" y2="315" stroke="#222" stroke-width="1.5"/>
  <polygon points="540,315 528,308 528,322" fill="#222"/>

  <!-- The builder — right side, glowing card -->
  <rect x="590" y="155" width="460" height="290" rx="8" fill="#0a0e0a" stroke="#00D4FF" stroke-opacity="0.4" stroke-width="1.5"/>
  <rect x="595" y="160" width="460" height="290" rx="8" fill="none" stroke="#00D4FF" stroke-opacity="0.06" stroke-width="10"/>

  <text x="615" y="195" font-family="sans-serif" font-size="10" fill="#00D4FF" fill-opacity="0.5" letter-spacing="2">THE BUILDER</text>
  <rect x="615" y="208" width="200" height="7" rx="2" fill="#00D4FF" fill-opacity="0.18"/>
  <rect x="615" y="221" width="160" height="7" rx="2" fill="#00D4FF" fill-opacity="0.12"/>

  <!-- Shipped product indicators -->
  <line x1="615" y1="250" x2="1030" y2="250" stroke="#1e2e1e" stroke-width="1"/>
  <text x="615" y="272" font-family="sans-serif" font-size="10" fill="#556" letter-spacing="2">SHIPPED</text>
  <rect x="700" y="262" width="40" height="18" rx="3" fill="#00D4FF" fill-opacity="0.15" stroke="#00D4FF" stroke-opacity="0.3" stroke-width="1"/>
  <text x="709" y="274" font-family="sans-serif" font-size="8" fill="#00D4FF" fill-opacity="0.7">v1.0</text>
  <rect x="750" y="262" width="40" height="18" rx="3" fill="#00D4FF" fill-opacity="0.15" stroke="#00D4FF" stroke-opacity="0.3" stroke-width="1"/>
  <text x="759" y="274" font-family="sans-serif" font-size="8" fill="#00D4FF" fill-opacity="0.7">v2.3</text>
  <rect x="800" y="262" width="40" height="18" rx="3" fill="#00D4FF" fill-opacity="0.15" stroke="#00D4FF" stroke-opacity="0.3" stroke-width="1"/>
  <text x="809" y="274" font-family="sans-serif" font-size="8" fill="#00D4FF" fill-opacity="0.7">v4.1</text>

  <line x1="615" y1="298" x2="1030" y2="298" stroke="#1e2e1e" stroke-width="1"/>
  <text x="615" y="320" font-family="sans-serif" font-size="10" fill="#556" letter-spacing="2">DECISIONS MADE</text>
  <rect x="780" y="310" width="120" height="18" rx="3" fill="#334" fill-opacity="0.4"/>
  <rect x="780" y="310" width="72" height="18" rx="3" fill="#00D4FF" fill-opacity="0.2"/>

  <line x1="615" y1="346" x2="1030" y2="346" stroke="#1e2e1e" stroke-width="1"/>
  <text x="615" y="368" font-family="sans-serif" font-size="10" fill="#556" letter-spacing="2">CAN EXPLAIN THE WHY</text>
  <text x="980" y="368" font-family="sans-serif" font-size="10" fill="#00D4FF" fill-opacity="0.5">✓</text>

  <line x1="615" y1="394" x2="1030" y2="394" stroke="#1e2e1e" stroke-width="1"/>
  <text x="850" y="430" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#00D4FF" fill-opacity="0.35" letter-spacing="2">HIRE THIS ONE</text>

  <text x="600" y="565" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#00D4FF" fill-opacity="0.2" letter-spacing="5">HOW TO HIRE A PM WHO BUILDS</text>
</svg>
