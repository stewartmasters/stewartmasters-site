<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg7" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0d110d"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg7)"/>

  <!-- Org chart structure -->
  <!-- Top node — Board level -->
  <rect x="500" y="130" width="200" height="70" rx="5" fill="#0f120f" stroke="#00D4FF" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="600" y="162" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#00D4FF" fill-opacity="0.7" letter-spacing="2">BOARD</text>
  <text x="600" y="182" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#556" letter-spacing="1">GOVERNANCE</text>

  <!-- Connector lines down -->
  <line x1="600" y1="200" x2="600" y2="250" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="380" y1="250" x2="820" y2="250" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="380" y1="250" x2="380" y2="290" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="600" y1="250" x2="600" y2="290" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="820" y1="250" x2="820" y2="290" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1"/>

  <!-- NED box — highlighted -->
  <rect x="280" y="290" width="200" height="80" rx="5" fill="#0a140a" stroke="#00D4FF" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="380" y="325" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="12" fill="#00D4FF" fill-opacity="0.8" font-weight="600" letter-spacing="2">NED</text>
  <text x="380" y="345" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#00D4FF" fill-opacity="0.4" letter-spacing="1">NON-EXECUTIVE</text>
  <text x="380" y="360" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#00D4FF" fill-opacity="0.4" letter-spacing="1">DIRECTOR</text>

  <!-- CEO box -->
  <rect x="500" y="290" width="200" height="80" rx="5" fill="#0e0e0e" stroke="#1e1e1e" stroke-width="1"/>
  <text x="600" y="325" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="12" fill="#666" letter-spacing="2">CEO</text>
  <text x="600" y="345" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#444" letter-spacing="1">EXECUTIVE</text>

  <!-- Chair box -->
  <rect x="720" y="290" width="200" height="80" rx="5" fill="#0e0e0e" stroke="#1e1e1e" stroke-width="1"/>
  <text x="820" y="325" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="12" fill="#555" letter-spacing="2">CHAIR</text>
  <text x="820" y="345" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#444" letter-spacing="1">INDEPENDENT</text>

  <!-- NED key attributes below -->
  <line x1="380" y1="370" x2="380" y2="420" stroke="#00D4FF" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="260" y1="420" x2="500" y2="420" stroke="#00D4FF" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="260" y1="420" x2="260" y2="450" stroke="#00D4FF" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="380" y1="420" x2="380" y2="450" stroke="#00D4FF" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="500" y1="420" x2="500" y2="450" stroke="#00D4FF" stroke-opacity="0.1" stroke-width="1"/>

  <text x="260" y="470" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="9" fill="#445" letter-spacing="1">OVERSIGHT</text>
  <text x="380" y="470" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="9" fill="#445" letter-spacing="1">CHALLENGE</text>
  <text x="500" y="470" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="9" fill="#445" letter-spacing="1">INDEPENDENCE</text>

  <text x="600" y="570" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="12" fill="#00D4FF" fill-opacity="0.2" letter-spacing="5">NON-EXECUTIVE DIRECTOR</text>
</svg>
