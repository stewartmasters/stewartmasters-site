<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bgp" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0d0e14"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgp)"/>
  <!-- Document shape -->
  <rect x="380" y="100" width="440" height="430" rx="6" fill="#0e0e14" stroke="#1e1e2a" stroke-width="1.5"/>
  <!-- Doc top fold -->
  <polygon points="780,100 820,140 780,140" fill="#12121a" stroke="#1e1e2a" stroke-width="1"/>
  <line x1="780" y1="100" x2="820" y2="140" stroke="#1e1e2a" stroke-width="1"/>
  <!-- Section 1 — highlighted -->
  <rect x="400" y="135" width="400" height="58" rx="3" fill="#0a0d14" stroke="#00D4FF" stroke-opacity="0.4" stroke-width="1"/>
  <text x="420" y="155" font-family="sans-serif" font-size="9" fill="#00D4FF" fill-opacity="0.6" letter-spacing="2">01  THE PROBLEM</text>
  <rect x="420" y="163" width="200" height="6" rx="2" fill="#00D4FF" fill-opacity="0.15"/>
  <rect x="420" y="173" width="150" height="6" rx="2" fill="#00D4FF" fill-opacity="0.1"/>
  <!-- Section 2 -->
  <rect x="400" y="205" width="400" height="55" rx="3" fill="#0e0e16" stroke="#1e1e2e" stroke-width="1"/>
  <text x="420" y="223" font-family="sans-serif" font-size="9" fill="#00D4FF" fill-opacity="0.4" letter-spacing="2">02  WHO IT'S FOR</text>
  <rect x="420" y="231" width="180" height="6" rx="2" fill="#333" fill-opacity="0.5"/>
  <rect x="420" y="241" width="120" height="6" rx="2" fill="#333" fill-opacity="0.35"/>
  <!-- Section 3 — highlighted -->
  <rect x="400" y="272" width="400" height="55" rx="3" fill="#0a0d14" stroke="#00D4FF" stroke-opacity="0.3" stroke-width="1"/>
  <text x="420" y="290" font-family="sans-serif" font-size="9" fill="#00D4FF" fill-opacity="0.5" letter-spacing="2">03  WHAT SUCCESS LOOKS LIKE</text>
  <rect x="420" y="298" width="220" height="6" rx="2" fill="#00D4FF" fill-opacity="0.12"/>
  <rect x="420" y="308" width="160" height="6" rx="2" fill="#00D4FF" fill-opacity="0.08"/>
  <!-- Section 4 -->
  <rect x="400" y="339" width="400" height="55" rx="3" fill="#0e0e16" stroke="#1e1e2e" stroke-width="1"/>
  <text x="420" y="357" font-family="sans-serif" font-size="9" fill="#00D4FF" fill-opacity="0.35" letter-spacing="2">04  OUT OF SCOPE</text>
  <rect x="420" y="365" width="170" height="6" rx="2" fill="#333" fill-opacity="0.4"/>
  <rect x="420" y="375" width="130" height="6" rx="2" fill="#333" fill-opacity="0.3"/>
  <!-- Section 5 -->
  <rect x="400" y="406" width="400" height="55" rx="3" fill="#0e0e16" stroke="#1e1e2e" stroke-width="1"/>
  <text x="420" y="424" font-family="sans-serif" font-size="9" fill="#00D4FF" fill-opacity="0.35" letter-spacing="2">05  THE CONSTRAINT THAT MATTERS</text>
  <rect x="420" y="432" width="190" height="6" rx="2" fill="#333" fill-opacity="0.4"/>
  <rect x="420" y="442" width="140" height="6" rx="2" fill="#333" fill-opacity="0.3"/>
  <!-- "1 PAGE" label -->
  <text x="600" y="490" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#00D4FF" fill-opacity="0.3" letter-spacing="3">ONE PAGE</text>
  <text x="600" y="570" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#00D4FF" fill-opacity="0.2" letter-spacing="5">PRODUCT BRIEF</text>
</svg>
