<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bgdfo" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0d100d"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgdfo)"/>

  <!-- Traditional ops — left: manual chain with delays -->
  <text x="160" y="165" font-family="sans-serif" font-size="10" fill="#444" letter-spacing="3">TRADITIONAL</text>

  <!-- Process nodes with long connectors -->
  <rect x="160" y="190" width="80" height="50" rx="4" fill="#111" stroke="#222"/>
  <text x="200" y="220" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#444" letter-spacing="1">ORDER</text>

  <!-- Delay indicator -->
  <line x1="240" y1="215" x2="290" y2="215" stroke="#222" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="265" y="208" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#333">2h</text>

  <rect x="290" y="190" width="80" height="50" rx="4" fill="#111" stroke="#222"/>
  <text x="330" y="220" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#444" letter-spacing="1">CHECK</text>

  <line x1="370" y1="215" x2="420" y2="215" stroke="#222" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="395" y="208" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#333">4h</text>

  <rect x="420" y="190" width="80" height="50" rx="4" fill="#111" stroke="#222"/>
  <text x="460" y="220" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#444" letter-spacing="1">ROUTE</text>

  <line x1="500" y1="215" x2="540" y2="215" stroke="#222" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="520" y="208" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#333">6h</text>

  <!-- Manual hand-offs -->
  <text x="165" y="270" font-family="sans-serif" font-size="9" fill="#2a2a2a" letter-spacing="1">↳ manual handoff</text>
  <text x="295" y="270" font-family="sans-serif" font-size="9" fill="#2a2a2a" letter-spacing="1">↳ email check</text>
  <text x="425" y="270" font-family="sans-serif" font-size="9" fill="#2a2a2a" letter-spacing="1">↳ manual assign</text>

  <text x="200" y="310" font-family="sans-serif" font-size="10" fill="#333" letter-spacing="2">12+ HOURS TO RESOLVE</text>

  <!-- VS divider -->
  <line x1="600" y1="140" x2="600" y2="500" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- Digital-first ops — right: parallel, fast, automated -->
  <text x="650" y="165" font-family="sans-serif" font-size="10" fill="#00D4FF" fill-opacity="0.5" letter-spacing="3">DIGITAL-FIRST</text>

  <!-- Central hub -->
  <circle cx="870" cy="300" r="50" fill="#0a100a" stroke="#00D4FF" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="870" y="296" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#00D4FF" fill-opacity="0.6" letter-spacing="1">AUTO</text>
  <text x="870" y="312" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#00D4FF" fill-opacity="0.4" letter-spacing="1">ROUTE</text>

  <!-- Spokes — simultaneous -->
  <line x1="820" y1="260" x2="720" y2="200" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="660" y="175" width="60" height="30" rx="3" fill="#0a100a" stroke="#00D4FF" stroke-opacity="0.25" stroke-width="1"/>
  <text x="690" y="194" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#445" letter-spacing="1">NOTIFY</text>

  <line x1="920" y1="260" x2="1010" y2="200" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="1010" y="175" width="60" height="30" rx="3" fill="#0a100a" stroke="#00D4FF" stroke-opacity="0.25" stroke-width="1"/>
  <text x="1040" y="194" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#445" letter-spacing="1">LOG</text>

  <line x1="820" y1="340" x2="720" y2="400" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="660" y="385" width="60" height="30" rx="3" fill="#0a100a" stroke="#00D4FF" stroke-opacity="0.25" stroke-width="1"/>
  <text x="690" y="404" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#445" letter-spacing="1">ASSIGN</text>

  <line x1="920" y1="340" x2="1010" y2="400" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="1010" y="385" width="60" height="30" rx="3" fill="#0a100a" stroke="#00D4FF" stroke-opacity="0.25" stroke-width="1"/>
  <text x="1040" y="404" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#445" letter-spacing="1">ALERT</text>

  <text x="870" y="472" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#00D4FF" fill-opacity="0.4" letter-spacing="2">4 MIN TO RESOLVE</text>

  <text x="600" y="565" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#00D4FF" fill-opacity="0.2" letter-spacing="5">DIGITAL-FIRST OPERATIONS</text>
</svg>
