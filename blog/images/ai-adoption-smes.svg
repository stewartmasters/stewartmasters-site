<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg-as" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0e0e18"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <radialGradient id="glow-as" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-as)"/>
  <ellipse cx="600" cy="315" rx="380" ry="255" fill="url(#glow-as)"/>

  <!-- Three-step ladder / staircase going up -->
  <!-- Step 1 — Productivity -->
  <rect x="360" y="390" width="160" height="60" rx="4" fill="#00D4FF" fill-opacity="0.08" stroke="#00D4FF" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="440" y="415" text-anchor="middle" font-family="monospace" font-size="9" fill="#00D4FF" fill-opacity="0.6">PRODUCTIVITY</text>
  <text x="440" y="430" text-anchor="middle" font-family="monospace" font-size="8" fill="#00D4FF" fill-opacity="0.4">drafting · research</text>
  <text x="440" y="443" text-anchor="middle" font-family="monospace" font-size="8" fill="#00D4FF" fill-opacity="0.3">START HERE</text>

  <!-- Step 2 — Analysis -->
  <rect x="520" y="310" width="160" height="60" rx="4" fill="#00D4FF" fill-opacity="0.06" stroke="#00D4FF" stroke-opacity="0.25" stroke-width="1.5"/>
  <text x="600" y="335" text-anchor="middle" font-family="monospace" font-size="9" fill="#00D4FF" fill-opacity="0.5">ANALYSIS</text>
  <text x="600" y="350" text-anchor="middle" font-family="monospace" font-size="8" fill="#00D4FF" fill-opacity="0.35">data · insights</text>
  <text x="600" y="363" text-anchor="middle" font-family="monospace" font-size="8" fill="#00D4FF" fill-opacity="0.25">STEP 2</text>

  <!-- Step 3 — Customer-facing -->
  <rect x="680" y="225" width="160" height="65" rx="4" fill="#00D4FF" fill-opacity="0.04" stroke="#00D4FF" stroke-opacity="0.18" stroke-width="1.5"/>
  <text x="760" y="250" text-anchor="middle" font-family="monospace" font-size="9" fill="#00D4FF" fill-opacity="0.4">CUSTOMER-FACING</text>
  <text x="760" y="265" text-anchor="middle" font-family="monospace" font-size="8" fill="#00D4FF" fill-opacity="0.3">chatbot · automation</text>
  <text x="760" y="278" text-anchor="middle" font-family="monospace" font-size="8" fill="#00D4FF" fill-opacity="0.2">STEP 3</text>

  <!-- Connecting steps -->
  <path d="M 520 420 L 520 370 L 520 370" fill="none" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="3,3"/>
  <path d="M 680 340 L 680 290 L 680 290" fill="none" stroke="#00D4FF" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Stair risers -->
  <line x1="520" y1="370" x2="520" y2="450" stroke="#00D4FF" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="680" y1="290" x2="680" y2="370" stroke="#00D4FF" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Budget labels on the side -->
  <text x="310" y="425" font-family="monospace" font-size="9" fill="#00D4FF" fill-opacity="0.2">£0-500/mo</text>
  <text x="310" y="345" font-family="monospace" font-size="9" fill="#00D4FF" fill-opacity="0.15">£500-2k/mo</text>
  <text x="310" y="260" font-family="monospace" font-size="9" fill="#00D4FF" fill-opacity="0.12">£2k+/mo</text>

  <text x="600" y="570" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="12" fill="#00D4FF" fill-opacity="0.25" letter-spacing="5">AI FOR SMEs</text>
</svg>
