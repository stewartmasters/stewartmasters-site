<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0d12"/>
      <stop offset="100%" style="stop-color:#0d1018"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="55" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#00D4FF" opacity="0.6" letter-spacing="4" text-anchor="middle">AI &amp; TECHNOLOGY</text>
  <text x="600" y="88" font-family="'Space Grotesk', sans-serif" font-size="26" font-weight="700" fill="#fff" opacity="0.9" text-anchor="middle">The Biggest Mistakes Companies Make With AI Adoption</text>

  <!-- 6-cell grid: 3 cols x 2 rows -->
  <!-- Row 1 -->
  <rect x="60" y="108" width="345" height="120" rx="6" fill="#100808" stroke="#903030" stroke-width="1" opacity="0.6"/>
  <text x="80" y="132" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#903030" opacity="0.5" letter-spacing="2">01</text>
  <text x="232" y="132" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="600" fill="#c05050" text-anchor="middle" opacity="0.9">Starting with the technology</text>
  <text x="232" y="152" font-family="monospace" font-size="8" fill="#703030" text-anchor="middle">Picking a tool, then searching for problems</text>
  <text x="232" y="168" font-family="monospace" font-size="8" fill="#5a2525" text-anchor="middle">Inverts the logic — leads to solutions looking for problems</text>
  <text x="232" y="184" font-family="monospace" font-size="8" fill="#4a2020" text-anchor="middle">Fix: start with a named operational pain point</text>
  <rect x="80" y="212" width="305" height="4" rx="2" fill="#903030" opacity="0.15"/>

  <rect x="427" y="108" width="345" height="120" rx="6" fill="#100808" stroke="#903030" stroke-width="1" opacity="0.5"/>
  <text x="447" y="132" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#903030" opacity="0.45" letter-spacing="2">02</text>
  <text x="599" y="132" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="600" fill="#b04040" text-anchor="middle" opacity="0.85">Treating data as someone else's problem</text>
  <text x="599" y="152" font-family="monospace" font-size="8" fill="#703030" text-anchor="middle">Data readiness assessed after investment is made</text>
  <text x="599" y="168" font-family="monospace" font-size="8" fill="#5a2525" text-anchor="middle">Fragmented, inconsistent data stops projects cold</text>
  <text x="599" y="184" font-family="monospace" font-size="8" fill="#4a2020" text-anchor="middle">Fix: data audit before any AI commitment</text>
  <rect x="447" y="212" width="305" height="4" rx="2" fill="#903030" opacity="0.12"/>

  <rect x="794" y="108" width="345" height="120" rx="6" fill="#100808" stroke="#903030" stroke-width="1" opacity="0.45"/>
  <text x="814" y="132" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#903030" opacity="0.4" letter-spacing="2">03</text>
  <text x="966" y="132" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="600" fill="#a03838" text-anchor="middle" opacity="0.8">Underinvesting in change management</text>
  <text x="966" y="152" font-family="monospace" font-size="8" fill="#703030" text-anchor="middle">80% on technology, 20% on people — backwards</text>
  <text x="966" y="168" font-family="monospace" font-size="8" fill="#5a2525" text-anchor="middle">Training sessions without workflow redesign fail</text>
  <text x="966" y="184" font-family="monospace" font-size="8" fill="#4a2020" text-anchor="middle">Fix: equal weight on tech and people-side work</text>
  <rect x="814" y="212" width="305" height="4" rx="2" fill="#903030" opacity="0.1"/>

  <!-- Row 2 -->
  <rect x="60" y="248" width="345" height="120" rx="6" fill="#100808" stroke="#903030" stroke-width="1" opacity="0.4"/>
  <text x="80" y="272" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#903030" opacity="0.35" letter-spacing="2">04</text>
  <text x="232" y="272" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="600" fill="#903030" text-anchor="middle" opacity="0.75">Measuring deployment, not outcomes</text>
  <text x="232" y="292" font-family="monospace" font-size="8" fill="#5a2020" text-anchor="middle">"300 users rolled out" — tells you nothing useful</text>
  <text x="232" y="308" font-family="monospace" font-size="8" fill="#4a1a1a" text-anchor="middle">No baseline = no ability to measure change</text>
  <text x="232" y="324" font-family="monospace" font-size="8" fill="#3a1515" text-anchor="middle">Fix: capture baseline data before implementation</text>
  <rect x="80" y="352" width="305" height="4" rx="2" fill="#903030" opacity="0.08"/>

  <rect x="427" y="248" width="345" height="120" rx="6" fill="#100808" stroke="#903030" stroke-width="1" opacity="0.35"/>
  <text x="447" y="272" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#903030" opacity="0.3" letter-spacing="2">05</text>
  <text x="599" y="272" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="600" fill="#883030" text-anchor="middle" opacity="0.7">Building custom when off-the-shelf works</text>
  <text x="599" y="292" font-family="monospace" font-size="8" fill="#5a2020" text-anchor="middle">Custom = more expensive, slower, more risk</text>
  <text x="599" y="308" font-family="monospace" font-size="8" fill="#4a1a1a" text-anchor="middle">Most use cases don't need proprietary models</text>
  <text x="599" y="324" font-family="monospace" font-size="8" fill="#3a1515" text-anchor="middle">Fix: use off-the-shelf unless there's a specific reason not to</text>
  <rect x="447" y="352" width="305" height="4" rx="2" fill="#903030" opacity="0.07"/>

  <rect x="794" y="248" width="345" height="120" rx="6" fill="#100808" stroke="#903030" stroke-width="1" opacity="0.3"/>
  <text x="814" y="272" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#903030" opacity="0.25" letter-spacing="2">06</text>
  <text x="966" y="272" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="600" fill="#803030" text-anchor="middle" opacity="0.65">Ignoring workflow integration</text>
  <text x="966" y="292" font-family="monospace" font-size="8" fill="#5a2020" text-anchor="middle">Tools outside existing systems won't be adopted</text>
  <text x="966" y="308" font-family="monospace" font-size="8" fill="#4a1a1a" text-anchor="middle">Friction cost exceeds perceived benefit — people revert</text>
  <text x="966" y="324" font-family="monospace" font-size="8" fill="#3a1515" text-anchor="middle">Fix: appear where people already work</text>
  <rect x="814" y="352" width="305" height="4" rx="2" fill="#903030" opacity="0.06"/>

  <!-- Bottom bar -->
  <rect x="60" y="388" width="1080" height="36" rx="4" fill="#0a0f0a" stroke="#1a2a1a" stroke-width="1"/>
  <text x="600" y="411" font-family="'Space Grotesk', sans-serif" font-size="13" fill="#aaa" text-anchor="middle">The technology is rarely where AI adoption fails — the organisational complexity around it is</text>
</svg>
