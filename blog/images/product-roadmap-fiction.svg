<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0a"/>
      <stop offset="100%" style="stop-color:#14120a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Fake roadmap — quarterly grid on left -->
  <rect x="80" y="140" width="520" height="360" rx="6" fill="#0c0c08" stroke="#1e1e10" stroke-width="1"/>

  <!-- Header row -->
  <rect x="80" y="140" width="130" height="40" fill="#111108" stroke="#1e1e10" stroke-width="1"/>
  <rect x="210" y="140" width="130" height="40" fill="#111108" stroke="#1e1e10" stroke-width="1"/>
  <rect x="340" y="140" width="130" height="40" fill="#111108" stroke="#1e1e10" stroke-width="1"/>
  <rect x="470" y="140" width="130" height="40" fill="#111108" stroke="#1e1e10" stroke-width="1"/>

  <text x="145" y="165" font-family="monospace" font-size="11" fill="#3a3a20" text-anchor="middle" letter-spacing="1">Q1</text>
  <text x="275" y="165" font-family="monospace" font-size="11" fill="#3a3a20" text-anchor="middle" letter-spacing="1">Q2</text>
  <text x="405" y="165" font-family="monospace" font-size="11" fill="#3a3a20" text-anchor="middle" letter-spacing="1">Q3</text>
  <text x="535" y="165" font-family="monospace" font-size="11" fill="#3a3a20" text-anchor="middle" letter-spacing="1">Q4</text>

  <!-- Row 1: Feature A — spans Q1-Q2 but crossed out -->
  <text x="95" y="202" font-family="monospace" font-size="10" fill="#555" letter-spacing="0.5">Feature A</text>
  <rect x="210" y="188" width="250" height="24" rx="3" fill="#2a2a10" stroke="#3a3a18" stroke-width="1" opacity="0.6"/>
  <line x1="218" y1="200" x2="452" y2="200" stroke="#ff4444" stroke-width="1.5" opacity="0.4"/>

  <!-- Row 2: Feature B — Q1 only, marked "shipped" -->
  <text x="95" y="240" font-family="monospace" font-size="10" fill="#555" letter-spacing="0.5">Feature B</text>
  <rect x="210" y="226" width="120" height="24" rx="3" fill="#1a2a10" stroke="#2a4a18" stroke-width="1" opacity="0.8"/>
  <text x="270" y="243" font-family="monospace" font-size="9" fill="#2a6020" text-anchor="middle">✓ shipped</text>

  <!-- Row 3: Feature C — Q2 but slipped to Q4 with arrow -->
  <text x="95" y="278" font-family="monospace" font-size="10" fill="#555" letter-spacing="0.5">Feature C</text>
  <rect x="340" y="264" width="120" height="24" rx="3" fill="#2a2010" stroke="#3a3010" stroke-width="1" opacity="0.5"/>
  <text x="400" y="280" font-family="monospace" font-size="9" fill="#5a4020" text-anchor="middle" font-style="italic">slipped</text>
  <path d="M 462 276 Q 500 260 490 276" stroke="#ff8800" stroke-width="1" fill="none" opacity="0.4" marker-end="url(#arr)"/>
  <rect x="470" y="264" width="120" height="24" rx="3" fill="#2a1a08" stroke="#3a2a10" stroke-width="1" opacity="0.6"/>
  <text x="530" y="280" font-family="monospace" font-size="9" fill="#5a3820" text-anchor="middle">?</text>

  <!-- Row 4: Feature D — big blocker -->
  <text x="95" y="316" font-family="monospace" font-size="10" fill="#555" letter-spacing="0.5">Feature D</text>
  <rect x="80" y="302" width="130" height="24" rx="3" fill="#200a0a" stroke="#3a1a1a" stroke-width="1" opacity="0.6"/>
  <text x="145" y="318" font-family="monospace" font-size="9" fill="#5a2020" text-anchor="middle">⚡ blocked</text>

  <!-- Row 5: Feature E — not started -->
  <text x="95" y="354" font-family="monospace" font-size="10" fill="#333" letter-spacing="0.5">Feature E</text>
  <rect x="340" y="340" width="260" height="24" rx="3" fill="#1a1a0a" stroke="#252510" stroke-width="1" opacity="0.4"/>
  <text x="470" y="356" font-family="monospace" font-size="9" fill="#2a2a10" text-anchor="middle">not yet estimated</text>

  <!-- Row 6: Feature F — added by sales -->
  <text x="95" y="392" font-family="monospace" font-size="10" fill="#333" letter-spacing="0.5">Feature F</text>
  <rect x="210" y="378" width="390" height="24" rx="3" fill="#1a1008" stroke="#2a2010" stroke-width="1" opacity="0.4"/>
  <text x="405" y="394" font-family="monospace" font-size="9" fill="#383808" text-anchor="middle">added by sales — no estimate — no owner</text>

  <!-- Row 7: Feature G — "nice to have" -->
  <text x="95" y="430" font-family="monospace" font-size="10" fill="#333" letter-spacing="0.5">Feature G</text>
  <rect x="80" y="416" width="520" height="24" rx="3" fill="#14140a" stroke="#1e1e0f" stroke-width="1" opacity="0.3"/>
  <text x="340" y="432" font-family="monospace" font-size="9" fill="#252508" text-anchor="middle">nice to have · Q1 of every year since 2022</text>

  <!-- Strike-through label on whole thing -->
  <rect x="86" y="460" width="508" height="26" rx="3" fill="#200808" stroke="#3a1010" stroke-width="1" opacity="0.7"/>
  <text x="340" y="477" font-family="monospace" font-size="10" fill="#8a2020" text-anchor="middle" letter-spacing="1">THIS IS NOT A PLAN. IT IS A WISH LIST.</text>

  <!-- Right side: What a real roadmap looks like -->
  <rect x="680" y="140" width="440" height="360" rx="6" fill="#090d0a" stroke="#0f1e12" stroke-width="1"/>
  <text x="900" y="172" font-family="monospace" font-size="11" fill="#1e4a20" text-anchor="middle" letter-spacing="2">OUTCOME-BASED ROADMAP</text>
  <line x1="700" y1="184" x2="1100" y2="184" stroke="#0f1e12" stroke-width="1"/>

  <!-- Now -->
  <rect x="700" y="196" width="60" height="18" rx="2" fill="#1a3020" stroke="#2a4a2a" stroke-width="1"/>
  <text x="730" y="209" font-family="monospace" font-size="10" fill="#3a7a3a" text-anchor="middle">NOW</text>
  <text x="780" y="209" font-family="monospace" font-size="11" fill="#EAEAEA" opacity="0.8">Reduce checkout drop-off by 20%</text>
  <text x="780" y="224" font-family="monospace" font-size="9" fill="#444">Owner: PM · Confidence: high · 6 weeks</text>

  <!-- Next -->
  <line x1="700" y1="240" x2="1100" y2="240" stroke="#0f1e12" stroke-width="0.5" stroke-dasharray="3,6"/>
  <rect x="700" y="252" width="60" height="18" rx="2" fill="#142a20" stroke="#1e3a28" stroke-width="1"/>
  <text x="730" y="265" font-family="monospace" font-size="10" fill="#2a5a38" text-anchor="middle">NEXT</text>
  <text x="780" y="265" font-family="monospace" font-size="11" fill="#EAEAEA" opacity="0.7">Launch B2B onboarding flow</text>
  <text x="780" y="280" font-family="monospace" font-size="9" fill="#333">Owner: TBD · Confidence: medium · depends on Now</text>

  <text x="780" y="306" font-family="monospace" font-size="11" fill="#EAEAEA" opacity="0.7">Improve search relevance</text>
  <text x="780" y="321" font-family="monospace" font-size="9" fill="#333">Owner: Eng · Confidence: medium · ~8 weeks</text>

  <!-- Later -->
  <line x1="700" y1="338" x2="1100" y2="338" stroke="#0f1e12" stroke-width="0.5" stroke-dasharray="3,6"/>
  <rect x="700" y="350" width="60" height="18" rx="2" fill="#0e2018" stroke="#162e20" stroke-width="1"/>
  <text x="730" y="363" font-family="monospace" font-size="10" fill="#1e4028" text-anchor="middle">LATER</text>
  <text x="780" y="363" font-family="monospace" font-size="11" fill="#EAEAEA" opacity="0.5">Internationalisation · Partnerships API</text>
  <text x="780" y="378" font-family="monospace" font-size="9" fill="#2a2a2a">No date. No estimate. Honest.</text>

  <line x1="700" y1="400" x2="1100" y2="400" stroke="#0f1e12" stroke-width="1"/>
  <text x="780" y="420" font-family="monospace" font-size="10" fill="#1e5028" opacity="0.8">→ What are we betting on and why?</text>
  <text x="780" y="438" font-family="monospace" font-size="10" fill="#1a3a22" opacity="0.7">→ Not: when will X be done?</text>
  <text x="780" y="456" font-family="monospace" font-size="10" fill="#162e1a" opacity="0.6">→ Recalibrate publicly and often</text>
  <text x="780" y="474" font-family="monospace" font-size="10" fill="#122410" opacity="0.5">→ Dates = false certainty</text>

  <!-- Title -->
  <text x="600" y="78" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#00D4FF" opacity="0.6" letter-spacing="4" text-anchor="middle">DIGITAL STRATEGY</text>
  <text x="600" y="114" font-family="'Space Grotesk', sans-serif" font-size="26" font-weight="700" fill="#fff" opacity="0.9" text-anchor="middle">Why Most Product Roadmaps Are Fiction</text>

  <ellipse cx="340" cy="300" rx="300" ry="200" fill="#ff8800" opacity="0.01"/>
  <ellipse cx="900" cy="300" rx="250" ry="180" fill="#00D4FF" opacity="0.01"/>
</svg>
